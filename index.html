  <div id="memorialText">R.I.P. LEGACY RUSSIAN ROULLETE SYSTEM, REN IS THE KING. 38.</div>

<script>
/* =========================
   SCREEN CRACK CACHE‑BUSTING
========================= */
(function() {
  const crackDiv = document.getElementById('screenCrack');
  const img = new Image();
  img.onload = function() {
    crackDiv.style.backgroundImage = `url(${img.src})`;
  };
  img.src = 'screencrack.png?t=' + Date.now();
})();

/* =========================
   GLOBAL AUDIO CONTEXT
========================= */
let audioCtx = null;
function ensureAudioContext() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) {
    console.warn("AudioContext not supported.");
  }
}

/* =========================
   ECONOMY
========================= */
let fridgesOwned = 0;
const spawnedFridges = [];

function updateCounter() {
  document.getElementById("fridgeCounter").innerText = `Fridges: ${fridgesOwned}`;
}

function toggleShop() {
  const shop = document.getElementById("shopMenu");
  shop.style.display = (shop.style.display === "block") ? "none" : "block";
}

function buyAutoclicker() {
  if (fridgesOwned >= 50) {
    const removed = spawnedFridges.splice(-50);
    removed.forEach(fridge => Matter.World.remove(world, fridge));
    fridgesOwned -= 50;
    updateCounter();
    setInterval(spawnFridge, 1000);
  } else {
    alert("NOT ENOUGH FRIDGES. YOU NEED 50.");
  }
}

/* =========================
   FRIDGE PHYSICS
========================= */
const { Engine, Render, Runner, Bodies, World, Mouse, MouseConstraint, Constraint, Events } = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element: document.body,
  engine,
  options: {
    width: window.innerWidth,
    height: window.innerHeight,
    wireframes: false,
    background: "#0b0f14"
  }
});

Render.run(render);
Runner.run(Runner.create(), engine);

// Walls tagged for collision detection
const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true, label: 'wall' });
const leftWall = Bodies.rectangle(-25, window.innerHeight / 2, 50, window.innerHeight * 2, { isStatic: true, label: 'wall' });
const rightWall = Bodies.rectangle(window.innerWidth + 25, window.innerHeight / 2, 50, window.innerHeight * 2, { isStatic: true, label: 'wall' });
const ceiling = Bodies.rectangle(window.innerWidth / 2, -100, window.innerWidth, 100, { isStatic: true, label: 'wall' });
World.add(world, [ground, leftWall, rightWall, ceiling]);

const fridgeImages = ["fridge1.png", "fridge2.png", "fridge3.png"];

function spawnFridge() {
  fridgesOwned++;
  updateCounter();

  const img = fridgeImages[Math.floor(Math.random() * fridgeImages.length)];
  const fridge = Bodies.rectangle(Math.random() * window.innerWidth, 50, 100, 150, {
    restitution: 0.6,
    friction: 0.2,
    render: { sprite: { texture: img, xScale: 0.35, yScale: 0.35 } }
  });
  World.add(world, fridge);
  spawnedFridges.push(fridge);
}

const mouse = Mouse.create(render.canvas);
const mouseConstraint = MouseConstraint.create(engine, {
  mouse,
  constraint: { stiffness: 0.2, render: { visible: false } }
});
World.add(world, mouseConstraint);
render.mouse = mouse;

window.addEventListener('resize', () => {
  render.canvas.width = window.innerWidth;
  render.canvas.height = window.innerHeight;
  Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 50 });
});

/* =========================
   MUSIC
========================= */
let analyser, source, masterGain, biquadFilter;
const audio = document.getElementById("audio");
const nowPlaying = document.getElementById("nowPlaying");

function initAudio() {
  if (!audioCtx) {
    ensureAudioContext();
    if (!audioCtx) return;
  }
  if (source) return;
  source = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  masterGain = audioCtx.createGain();
  biquadFilter = audioCtx.createBiquadFilter();
  biquadFilter.type = "lowpass";
  biquadFilter.frequency.value = 24000;
  analyser.fftSize = 64;
  source.connect(analyser);
  analyser.connect(biquadFilter);
  biquadFilter.connect(masterGain);
  masterGain.connect(audioCtx.destination);
}

const songs = [
  "Intentional Manslaughter - Dying Fetus.mp3",
  "INTERCRANIAL LACERATION - SCENE SLUTZ SAWN IN HALF - 02 IF THATS YO BITCH THEN WHY SHE ROTTING IN MY BASEMENT (FT. PSYCHOJAVA).mp3"
];
let current = 0;

function loadSong(i) {
  current = (i + songs.length) % songs.length;
  audio.src = songs[current];
  nowPlaying.textContent = "now playing: " + songs[current];
  audio.playbackRate = 1;
}

function togglePlay() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  if (audio.paused) audio.play();
  else audio.pause();
}
function nextSong() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  loadSong(current + 1);
  audio.play();
}
function prevSong() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  loadSong(current - 1);
  audio.play();
}
loadSong(0);

/* =========================
   HEARTBEAT (breathing removed)
========================= */
function playHeartbeat() {
  if (!audioCtx) return;
  let beatTime = audioCtx.currentTime;
  let interval = 0.8;
  for (let i = 0; i < 12; i++) {
    const t = beatTime;
    // Lub
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = "sine";
    osc1.frequency.setValueAtTime(80, t);
    osc1.frequency.exponentialRampToValueAtTime(20, t + 0.3);
    gain1.gain.setValueAtTime(0, t);
    gain1.gain.linearRampToValueAtTime(2.5, t + 0.1);
    gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start(t);
    osc1.stop(t + 0.5);
    // Dub
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = "triangle";
    osc2.frequency.setValueAtTime(50, t + 0.25);
    osc2.frequency.exponentialRampToValueAtTime(15, t + 0.6);
    gain2.gain.setValueAtTime(0, t + 0.25);
    gain2.gain.linearRampToValueAtTime(2.2, t + 0.35);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(t + 0.25);
    osc2.stop(t + 0.8);
    beatTime += interval;
    interval *= 1.12;
  }
}

/* =========================
   RUSSIAN ROULETTE
========================= */
let isDead = false;
let survivalStreak = 0;
let cylinder = [];
let currentChamber = 0;

function reloadRevolver() {
  if (isDead) return;
  const bullets = parseInt(document.getElementById("bulletCount").value);
  cylinder = [];
  for (let i = 0; i < 6; i++) cylinder.push(i < bullets);
  for (let i = cylinder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cylinder[i], cylinder[j]] = [cylinder[j], cylinder[i]];
  }
  currentChamber = 0;
  survivalStreak = 0;
  updateStreak();
  const resultDiv = document.getElementById("rouletteResult");
  resultDiv.style.color = "yellow";
  resultDiv.textContent = "*Cylinder spun*";
  setTimeout(() => { if (!isDead && currentChamber === 0) resultDiv.textContent = ""; }, 1500);
}

function updateStreak() {
  const el = document.getElementById("streakDisplay");
  if (survivalStreak === 0) el.textContent = "";
  else {
    el.textContent = `survived ${survivalStreak} pull${survivalStreak !== 1 ? "s" : ""} in a row`;
    el.style.color = survivalStreak >= 5 ? "#ffcc00" : "#aaa";
  }
}

function playRoulette() {
  if (isDead) return;
  ensureAudioContext();
  if (cylinder.length === 0 || currentChamber >= 6) reloadRevolver();

  const hasBullet = cylinder[currentChamber];
  currentChamber++;
  const resultDiv = document.getElementById("rouletteResult");

  if (hasBullet) {
    isDead = true;
    survivalStreak = 0;
    document.getElementById("rouletteBtn").disabled = true;
    resultDiv.textContent = "";

    // t = 0
    document.getElementById("sfx-revolver").play();
    document.body.classList.add("shaking");
    const flash = document.getElementById("deathFlash");
    flash.style.opacity = 1;
    setTimeout(() => {
      flash.style.opacity = 0;
      document.body.classList.remove("shaking");
    }, 150);

    // t = 150 ms: bullet hits, crack + initial blood burst
    setTimeout(() => {
      document.getElementById("sfx-shatter").play();
      document.getElementById("sfx-flesh").play();
      document.getElementById("screenCrack").style.visibility = "visible";

      const bloodCanvas = document.getElementById("bloodCanvas");
      bloodCanvas.style.display = "block";
      startBloodAnimation(bloodCanvas);

      // Add the tear drop after burst settles
      setTimeout(() => {
        addTearDrop();
      }, 600);

      // Secondary burst
      setTimeout(() => {
        secondaryBloodBurst();
      }, 150);

      // Tunnel & blur
      setTimeout(() => {
        document.getElementById("tunnelVision").style.opacity = "1";
        document.getElementById("deathBlur").style.opacity = "1";
      }, 450);

      // Colour drain
      setTimeout(() => {
        document.body.style.filter = "grayscale(100%) sepia(100%) hue-rotate(-30deg) brightness(0.6)";
      }, 1050);

      // Heartbeat
      setTimeout(() => {
        playHeartbeat();
      }, 2250);

      // Fade to black
      setTimeout(() => {
        document.getElementById("deathFade").style.opacity = "1";
      }, 4850);

      // Music trauma & tinnitus
      setTimeout(() => {
        if (audioCtx && !audio.paused && analyser) {
          biquadFilter.frequency.setValueAtTime(biquadFilter.frequency.value, audioCtx.currentTime);
          biquadFilter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 2);
          masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
          masterGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);

          let smoothPitch = audio.playbackRate;
          const dropInterval = setInterval(() => {
            smoothPitch -= 0.015;
            if (smoothPitch > 0.05) audio.playbackRate = smoothPitch;
            else { clearInterval(dropInterval); audio.pause(); }
          }, 50);
        }

        if (audioCtx) {
          const tinnitusOsc = audioCtx.createOscillator();
          const tinnitusGain = audioCtx.createGain();
          tinnitusOsc.type = 'sine';
          tinnitusOsc.frequency.value = 7500;
          tinnitusGain.gain.setValueAtTime(0, audioCtx.currentTime);
          tinnitusGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
          tinnitusGain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 10);
          tinnitusOsc.connect(tinnitusGain);
          tinnitusGain.connect(audioCtx.destination);
          tinnitusOsc.start();
          tinnitusOsc.stop(audioCtx.currentTime + 10);
        }
      }, 600);

    }, 150);

  } else {
    survivalStreak++;
    updateStreak();
    resultDiv.style.color = "#00ff00";
    resultDiv.textContent = `Click... (Chamber ${currentChamber}/6 empty)`;
    if (currentChamber >= 6) setTimeout(() => { reloadRevolver(); }, 1500);
  }
}
window.onload = () => { reloadRevolver(); };

/* =========================
   TEAR DROP (from bullet hole)
========================= */
function addTearDrop() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  if (typeof dripsGlobal !== 'undefined' && dripsGlobal) {
    dripsGlobal.push({
      sx: cx, sy: cy,
      ex: cx, ey: cy,
      speed: 0.15,
      color: 'rgba(100,0,0,0.95)',
      alive: true,
      thickness: 3,
      branches: []
    });
  }
}

/* =========================
   BLOOD SYSTEM (global variables accessible)
========================= */
let bloodAnimationId = null;
let particles = [];
let settledStains = [];
let dripsGlobal = [];
let edgeDrips = [];
let poolLevel = 0;

function burstParticles(cx, cy, count, minSpeed, maxSpeed, minSize, maxSize) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = minSpeed + Math.random() * (maxSpeed - minSpeed);
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed;
    const life = 8 + Math.random() * 25;
    const size = minSize + Math.random() * (maxSize - minSize);
    const r = 40 + Math.floor(Math.random() * 60);
    const g = Math.floor(Math.random() * 10);
    const b = Math.floor(Math.random() * 10);
    const alpha = 0.6 + Math.random() * 0.4;
    particles.push({
      x: cx, y: cy,
      vx: vx, vy: vy,
      life: life,
      maxLife: life,
      size: size,
      color: `rgba(${r}, ${g}, ${b}, ${alpha})`,
      trail: []
    });
  }
}

function startBloodAnimation(canvas) {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = [];
  settledStains = [];
  dripsGlobal = [];
  edgeDrips = [];
  poolLevel = 0;

  burstParticles(canvas.width / 2, canvas.height / 2, 400, 4, 15, 1, 8);
  if (bloodAnimationId) cancelAnimationFrame(bloodAnimationId);
  bloodAnimationId = requestAnimationFrame(animateBlood);
}

function secondaryBloodBurst() {
  burstParticles(window.innerWidth / 2, window.innerHeight / 2, 200, 2, 10, 0.5, 4);
}

function animateBlood(timestamp) {
  const canvas = document.getElementById('bloodCanvas');
  if (canvas.style.display === 'none') return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Update & draw burst particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.93;
    p.vy *= 0.93 + 0.02;
    p.life--;

    p.trail.push({x: p.x, y: p.y});
    if (p.trail.length > 4) p.trail.shift();

    if (p.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) ctx.lineTo(p.trail[t].x, p.trail[t].y);
      ctx.strokeStyle = p.color.replace(/[\d\.]+\)$/g, '0.3)');
      ctx.lineWidth = p.size * 0.6;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();

    if (p.y <= 0 || p.x <= 0 || p.x >= canvas.width) {
      settledStains.push({ x: Math.max(0, Math.min(canvas.width, p.x)), y: Math.max(0, p.y), size: p.size * 0.7, color: p.color });
      particles.splice(i, 1);
      continue;
    }

    if (p.life <= 0 || (Math.abs(p.vx) < 0.2 && Math.abs(p.vy) < 0.2)) {
      settledStains.push({ x: p.x, y: p.y, size: p.size * 0.8, color: p.color });
      particles.splice(i, 1);
    }
  }

  // Draw settled stains
  for (const stain of settledStains) {
    ctx.beginPath();
    ctx.arc(stain.x, stain.y, stain.size, 0, Math.PI * 2);
    ctx.fillStyle = stain.color;
    ctx.fill();
  }

  // Generate edge drips
  if (edgeDrips.length === 0 && particles.length === 0 && settledStains.length > 0) {
    for (let i = 0; i < 25; i++) {
      const x = Math.random() * canvas.width;
      edgeDrips.push({ sx: x, sy: 0, ex: x, ey: 0, speed: 0.5 + Math.random() * 1.5, color: 'rgba(70,0,0,0.8)', alive: true, thickness: 1 + Math.random() * 2 });
    }
    for (let i = 0; i < 15; i++) {
      const y = Math.random() * canvas.height;
      edgeDrips.push({ sx: 0, sy: y, ex: 0, ey: y, speed: 0.5 + Math.random() * 1.2, color: 'rgba(70,0,0,0.8)', alive: true, thickness: 1 + Math.random() * 2 });
      edgeDrips.push({ sx: canvas.width, sy: y, ex: canvas.width, ey: y, speed: 0.5 + Math.random() * 1.2, color: 'rgba(70,0,0,0.8)', alive: true, thickness: 1 + Math.random() * 2 });
    }
  }

  // Generate regular drips from settled stains
  if (dripsGlobal.length === 0 && particles.length === 0 && settledStains.length > 0) {
    for (const stain of settledStains) {
      if (Math.random() < 0.4) {
        dripsGlobal.push({ sx: stain.x, sy: stain.y, ex: stain.x, ey: stain.y, speed: 0.2 + Math.random() * 1.0, color: stain.color, alive: true, thickness: stain.size * 0.5, branches: [] });
      }
    }
  }

  // Update & draw drips (including the teardrop added later)
  for (const drip of dripsGlobal) {
    if (!drip.alive) continue;
    drip.ey += drip.speed;
    drip.ex += (Math.random() - 0.5) * 0.6;

    const gradient = ctx.createLinearGradient(drip.sx, drip.sy, drip.ex, drip.ey);
    gradient.addColorStop(0, drip.color);
    gradient.addColorStop(1, drip.color.replace(/[\d\.]+\)$/g, '0.2)'));
    ctx.beginPath();
    ctx.moveTo(drip.sx, drip.sy);
    ctx.lineTo(drip.ex, drip.ey);
    ctx.strokeStyle = gradient;
    ctx.lineWidth = drip.thickness;
    ctx.stroke();

    if (Math.random() < 0.01) {
      drip.branches.push({ ex: drip.ex, ey: drip.ey, speed: drip.speed * 0.7, color: drip.color });
    }
    for (const branch of drip.branches) {
      branch.ey += branch.speed;
      branch.ex += (Math.random() - 0.5) * 0.5;
      ctx.beginPath();
      ctx.moveTo(drip.ex, drip.ey);
      ctx.lineTo(branch.ex, branch.ey);
      ctx.strokeStyle = branch.color;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    if (drip.ey >= canvas.height) {
      drip.alive = false;
      poolLevel += 0.2;
    }
  }

  // Edge drips
  for (const drip of edgeDrips) {
    if (!drip.alive) continue;
    drip.ey += drip.speed;
    drip.ex += (Math.random() - 0.5) * 0.5;
    ctx.beginPath();
    ctx.moveTo(drip.sx, drip.sy);
    ctx.lineTo(drip.ex, drip.ey);
    ctx.strokeStyle = drip.color;
    ctx.lineWidth = drip.thickness;
    ctx.stroke();
    if (drip.ey >= canvas.height) {
      drip.alive = false;
      poolLevel += 0.15;
    }
  }

  // Pool
  poolLevel = Math.min(poolLevel, 60);
  if (poolLevel > 0) {
    ctx.fillStyle = `rgba(50,0,0,${0.6 + poolLevel/200})`;
    ctx.fillRect(0, canvas.height - poolLevel, canvas.width, poolLevel);
  }

  bloodAnimationId = requestAnimationFrame(animateBlood);
}

/* =========================

const ragdollConstraints = [];

function activateGuy() {
  if (guyActivated) return;
  guyActivated = true;

  // Make dynamic
  ragdollParts.forEach(part => Matter.Body.setStatic(part, false));

  // Invisible, super tight constraints – perfectly holds shape
  const stiff = 0.9, damp = 0.2;
  const cOpts = (a, b, pa, pb) => Constraint.create({
    bodyA: a, bodyB: b,
    pointA: pa, pointB: pb,
    stiffness: stiff, damping: damp,
    render: { visible: false }
  });

  ragdollConstraints.push(
    cOpts(head, torso, { x: 0, y: 10 }, { x: 0, y: -15 }),
    cOpts(torso, leftUpperArm, { x: -7, y: -13 }, { x: 10, y: 0 }),
    cOpts(torso, rightUpperArm, { x: 7, y: -13 }, { x: -10, y: 0 }),
    cOpts(leftUpperArm, leftLowerArm, { x: -10, y: 0 }, { x: 9, y: 0 }),
    cOpts(rightUpperArm, rightLowerArm, { x: 10, y: 0 }, { x: -9, y: 0 }),
    cOpts(torso, leftUpperLeg, { x: -5, y: 15 }, { x: 0, y: -11 }),
    cOpts(torso, rightUpperLeg, { x: 5, y: 15 }, { x: 0, y: -11 }),
    cOpts(leftUpperLeg, leftLowerLeg, { x: 0, y: 11 }, { x: 0, y: -11 }),
    cOpts(rightUpperLeg, rightLowerLeg, { x: 0, y: 11 }, { x: 0, y: -11 })
  );
  World.add(world, ragdollConstraints);

  // Hide prompt
  document.getElementById('guyPrompt').style.display = 'none';
}

// Click to activate
render.canvas.addEventListener('mousedown', (e) => {
  if (guyActivated) return;
  const pos = { x: e.clientX, y: e.clientY };
  if (Matter.Query.point(ragdollParts, pos).length > 0) activateGuy();
});

/* =========================
   RAGDOLL BLEEDING (dynamic, scaled down)
========================= */
const ragdollBloodCanvas = document.getElementById('ragdollBloodCanvas');
const ragdollCtx = ragdollBloodCanvas.getContext('2d');
let ragdollBloodParticles = [];

function spawnRagdollBlood(x, y, intensity = 1) {
  const count = Math.floor(20 * intensity);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    ragdollBloodParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 5 + Math.random() * 10,
      size: 0.5 + Math.random() * 2,
      color: `rgba(80,0,0,${0.6 + Math.random() * 0.4})`
    });
  }
}

Events.on(engine, 'collisionStart', (event) => {
  if (!guyActivated) return;
  for (const pair of event.pairs) {
    const bodyA = pair.bodyA, bodyB = pair.bodyB;
    const ragdollPart = ragdollParts.includes(bodyA) ? bodyA : (ragdollParts.includes(bodyB) ? bodyB : null);
    const otherBody = ragdollPart === bodyA ? bodyB : bodyA;
    if (!ragdollPart || !otherBody || otherBody.label !== 'wall') continue;

    const relVel = {
      x: ragdollPart.velocity.x - (otherBody.isStatic ? 0 : otherBody.velocity.x),
      y: ragdollPart.velocity.y - (otherBody.isStatic ? 0 : otherBody.velocity.y)
    };
    const speed = Math.sqrt(relVel.x ** 2 + relVel.y ** 2);
    if (speed > 2) {
      const contact = pair.collision.supports ? pair.collision.supports[0] : ragdollPart.position;
      spawnRagdollBlood(contact.x, contact.y, Math.min(speed / 5, 1));
    }
  }
});

/* =========================
   PAINT TOOL (COEXISTS WITH FRIDGE DRAGGING)
========================= */
const pCanvas = document.getElementById("paintCanvas");
const pCtx = pCanvas.getContext("2d");
function resizePaintCanvas() {
  const tempCanvas = document.createElement('canvas');
  const tCtx = tempCanvas.getContext('2d');
  tempCanvas.width = pCanvas.width;
  tempCanvas.height = pCanvas.height;
  tCtx.drawImage(pCanvas, 0, 0);
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  pCtx.drawImage(tempCanvas, 0, 0);
}
window.addEventListener('resize', resizePaintCanvas);
pCanvas.width = window.innerWidth;
pCanvas.height = window.innerHeight;

let drawingActive = false;
const drawToggle = document.getElementById("drawToggle");
const colorPicker = document.getElementById("drawColor");
const sizeSlider = document.getElementById("drawSize");
const eraserBtn = document.getElementById("eraserBtn");
let isEraserMode = false;

eraserBtn.onclick = () => {
  isEraserMode = !isEraserMode;
  eraserBtn.style.background = isEraserMode ? 'white' : '';
  eraserBtn.style.color = isEraserMode ? 'black' : '';
};
window.clearCanvas = () => {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
};

const renderCanvas = render.canvas;

renderCanvas.addEventListener('mousedown', (e) => {
  if (!drawToggle.checked) return;
  if (mouseConstraint.constraint.bodyB) return;
  drawingActive = true;
  pCtx.beginPath();
  pCtx.moveTo(e.clientX, e.clientY);
});

renderCanvas.addEventListener('mousemove', (e) => {
  if (!drawingActive || !drawToggle.checked) return;
  if (mouseConstraint.constraint.bodyB) {
    drawingActive = false;
    return;
  }
  pCtx.lineWidth = sizeSlider.value;
  pCtx.lineCap = "round";
  if (isEraserMode) {
    pCtx.globalCompositeOperation = "destination-out";
    pCtx.strokeStyle = "rgba(0,0,0,1)";
  } else {
    pCtx.globalCompositeOperation = "source-over";
    pCtx.strokeStyle = colorPicker.value;
  }
  pCtx.lineTo(e.clientX, e.clientY);
  pCtx.stroke();
});

renderCanvas.addEventListener('mouseup', () => { drawingActive = false; });
renderCanvas.addEventListener('mouseout', () => { drawingActive = false; });

/* =========================
   KONAMI CODE
========================= */
const KONAMI_SEQUENCE = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a','s','t','a','r','t'];
let konamiProgress = 0;
document.addEventListener('keydown', (e) => {
  if (e.key === KONAMI_SEQUENCE[konamiProgress]) {
    konamiProgress++;
    if (konamiProgress === KONAMI_SEQUENCE.length) {
      triggerGundham();
      konamiProgress = 0;
    }
  } else {
    konamiProgress = (e.key === KONAMI_SEQUENCE[0]) ? 1 : 0;
  }
});
function triggerGundham() {
  audio.pause();
  Render.stop(render);
  document.body.innerHTML = '';
  document.body.style.cssText = 'margin:0; background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden;';
  const img = document.createElement('img');
  img.src = 'gundlex.gif';
  img.style.cssText = 'max-width:100vw; max-height:100vh; object-fit:contain;';
  document.body.appendChild(img);
}

/* =========================
   VISUALIZER + RAGDOLL BLOOD DRAWING
========================= */
const vizCanvas = document.getElementById("viz");
const vizCtx = vizCanvas.getContext("2d");
vizCanvas.width = 320;
vizCanvas.height = 80;
const dataArray = new Uint8Array(32);

function drawVisualizer() {
  requestAnimationFrame(drawVisualizer);
  if (!analyser || isDead) return;
  analyser.getByteFrequencyData(dataArray);
  vizCtx.fillStyle = "rgba(0, 0, 0, 0.35)";
  vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
  const barWidth = vizCanvas.width / dataArray.length;
  let peak = 0;

  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i];
    peak = Math.max(peak, v);
    const barHeight = (v / 255) * vizCanvas.height * 1.2;
    if (v > 200) {
      vizCtx.fillStyle = `rgba(255, 0, 0, 0.4)`;
      vizCtx.fillRect(i * barWidth - 2, vizCanvas.height - barHeight - (Math.random() * 15), barWidth + 4, barHeight);
    }
    vizCtx.fillStyle = `rgb(${200 + (v / 5)}, 0, 0)`;
    vizCtx.fillRect(i * barWidth, vizCanvas.height - barHeight, barWidth + 2, barHeight + Math.random() * 5);
  }

  if (peak > 180) {
    const stretchY = 1 + ((peak - 180) / 30);
    const lean = (Math.random() - 0.5) * 10;
    vizCanvas.style.transform = `scaleY(${stretchY}) skewX(${lean}deg) scaleX(1.05)`;
    vizCanvas.style.filter = `drop-shadow(0px -10px ${peak/10}px red) blur(1px)`;
    document.getElementById("vizGlow").style.opacity = "1";
  } else {
    vizCanvas.style.transform = "none";
    vizCanvas.style.filter = "none";
    document.getElementById("vizGlow").style.opacity = "0.3";
  }

  if (peak > 230 && !isDead) {
    document.body.style.transform = `translate(${Math.random()*6-3}px, ${Math.random()*6-3}px)`;
    spawnedFridges.forEach(f => {
      let yForce = (Math.random() * 3 + 1);
      if (Math.random() > 0.95) yForce = 25;
      Matter.Body.setVelocity(f, {
        x: f.velocity.x + (Math.random() - 0.5) * 4,
        y: f.velocity.y - yForce
      });
      Matter.Body.setAngularVelocity(f, f.angularVelocity + (Math.random() - 0.5) * 0.4);
    });
  } else if (!isDead) {
    document.body.style.transform = "none";
  }

  // -- Draw ragdoll blood --
  ragdollCtx.clearRect(0, 0, ragdollBloodCanvas.width, ragdollBloodCanvas.height);
  for (let i = ragdollBloodParticles.length - 1; i >= 0; i--) {
    const p = ragdollBloodParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95 + 0.03;
    p.life--;
    if (p.life <= 0) {
      ragdollBloodParticles.splice(i, 1);
      continue;
    }
    ragdollCtx.beginPath();
    ragdollCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ragdollCtx.fillStyle = p.color;
    ragdollCtx.fill();
  }
}

drawVisualizer();

// Resize ragdoll blood canvas on window resize
window.addEventListener('resize', () => {
  ragdollBloodCanvas.width = window.innerWidth;
  ragdollBloodCanvas.height = window.innerHeight;
});
ragdollBloodCanvas.width = window.innerWidth;
ragdollBloodCanvas.height = window.innerHeight;
