<script>
/* ===== SCREEN CRACK & BSOD CACHE-BUSTING ===== */
(function() { const d=document.getElementById('screenCrack'); const img=new Image(); img.onload=function(){ d.style.backgroundImage=`url(${img.src})`; }; img.src='screencrack.png?t='+Date.now(); })();
(function() { const d=document.getElementById('bsodOverlay'); const img=new Image(); img.onload=function(){ d.style.backgroundImage=`url(${img.src})`; }; img.src='BSOD.png?t='+Date.now(); })();

/* ===== GLOBAL AUDIO CONTEXT ===== */
let audioCtx = null;
let gameActive = false;
function ensureAudioContext() { if (audioCtx) return; try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { console.warn("AudioContext not supported."); } }

/* ===== ECONOMY & FRIDGE PHYSICS ===== */
let fridgesOwned = 0;
const spawnedFridges = [];
let autoclicker2Active = false;
function updateCounter() { document.getElementById("fridgeCounter").innerText = `Fridges: ${fridgesOwned}`; }
function toggleShop() { const s=document.getElementById("shopMenu"); s.style.display = (s.style.display==="block") ? "none" : "block"; }
function buyAutoclicker() {
  if (fridgesOwned>=50) {
    const removed = spawnedFridges.splice(-50); removed.forEach(f => Matter.World.remove(world, f));
    fridgesOwned -= 50; updateCounter(); setInterval(spawnFridge,1000); event.target.disabled = true;
  } else alert("NOT ENOUGH FRIDGES. YOU NEED 50.");
}
function buyAutoclicker2() {
  if (fridgesOwned >= 1000 && !autoclicker2Active) {
    const count = Math.min(1000, spawnedFridges.length);
    const removed = spawnedFridges.splice(-count); removed.forEach(f => Matter.World.remove(world, f));
    fridgesOwned -= 1000; updateCounter(); autoclicker2Active = true; setInterval(spawnFridge, 500);
    document.getElementById('buyAutoclicker2').disabled = true; document.getElementById('buyAutoclicker2').innerText = 'Bought';
  } else if (autoclicker2Active) { alert("Already purchased!"); }
  else { alert("NOT ENOUGH FRIDGES. YOU NEED 1000."); }
}

const { Engine, Render, Runner, Bodies, World, Mouse, MouseConstraint, Constraint, Events } = Matter;
const engine = Engine.create();
const world = engine.world;
const render = Render.create({ element: document.body, engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: "#0b0f14" } });
Render.run(render);
const matterRunner = Runner.create();
Runner.run(matterRunner, engine);

const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight+50, window.innerWidth, 100, { isStatic:true, label:'wall' });
const leftWall = Bodies.rectangle(-25, window.innerHeight/2, 50, window.innerHeight*2, { isStatic:true, label:'wall' });
const rightWall = Bodies.rectangle(window.innerWidth+25, window.innerHeight/2, 50, window.innerHeight*2, { isStatic:true, label:'wall' });
const ceiling = Bodies.rectangle(window.innerWidth/2, -100, window.innerWidth, 100, { isStatic:true, label:'wall' });
World.add(world, [ground, leftWall, rightWall, ceiling]);

const fridgeImages = ["fridge1.png","fridge2.png","fridge3.png"];
function spawnFridge() {
  fridgesOwned++; updateCounter();
  const img = fridgeImages[Math.floor(Math.random()*fridgeImages.length)];
  const fridge = Bodies.rectangle(Math.random()*window.innerWidth, 50, 100, 150, { restitution:0.6, friction:0.2, render: { sprite: { texture: img, xScale:0.35, yScale:0.35 } } });
  World.add(world, fridge); spawnedFridges.push(fridge);
}
const mouse = Mouse.create(render.canvas);
const mouseConstraint = MouseConstraint.create(engine, { mouse, constraint: { stiffness:0.2, render:{visible:false} } });
World.add(world, mouseConstraint);
render.mouse = mouse;
window.addEventListener('resize', () => { render.canvas.width = window.innerWidth; render.canvas.height = window.innerHeight; Matter.Body.setPosition(ground, { x: window.innerWidth/2, y: window.innerHeight+50 }); });

/* ===== FRIDGE CANNON ===== */
function fireFridgeCannon() {
  const img = fridgeImages[Math.floor(Math.random()*fridgeImages.length)];
  const startX = 0, startY = window.innerHeight * 0.5 + (Math.random()-0.5)*200;
  const cannonFridge = Bodies.rectangle(startX, startY, 100, 150, { restitution:0.4, friction:0.1, render: { sprite: { texture: img, xScale:0.35, yScale:0.35 } } });
  const forceMagnitude = 0.08 * (window.innerWidth / 20);
  Matter.Body.applyForce(cannonFridge, cannonFridge.position, { x: forceMagnitude, y: (Math.random()-0.5)*0.03 });
  fridgesOwned++; updateCounter(); World.add(world, cannonFridge); spawnedFridges.push(cannonFridge);
}

/* ===== MUSIC ===== */
let analyser, source, masterGain, biquadFilter;
const audio = document.getElementById("audio");
const nowPlaying = document.getElementById("nowPlaying");
function initAudio() {
  if (!audioCtx) { ensureAudioContext(); if(!audioCtx) return; }
  if (source) return;
  source = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  masterGain = audioCtx.createGain();
  biquadFilter = audioCtx.createBiquadFilter();
  biquadFilter.type = "lowpass"; biquadFilter.frequency.value = 24000;
  analyser.fftSize = 64;
  source.connect(analyser); analyser.connect(biquadFilter); biquadFilter.connect(masterGain); masterGain.connect(audioCtx.destination);
}
const songs = ["Intentional Manslaughter - Dying Fetus.mp3","INTERCRANIAL LACERATION - SCENE SLUTZ SAWN IN HALF - 02 IF THATS YO BITCH THEN WHY SHE ROTTING IN MY BASEMENT (FT. PSYCHOJAVA).mp3"];
let current=0;
function loadSong(i) { current = (i+songs.length)%songs.length; audio.src = songs[current]; nowPlaying.textContent = "now playing: "+songs[current]; audio.playbackRate=1; }
function togglePlay() { initAudio(); if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); if(audio.paused) audio.play(); else audio.pause(); }
function nextSong() { initAudio(); if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); loadSong(current+1); audio.play(); }
function prevSong() { initAudio(); if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); loadSong(current-1); audio.play(); }
loadSong(0);

/* ===== HEARTBEAT ===== */
function playHeartbeat() {
  if(!audioCtx) return;
  let beatTime = audioCtx.currentTime, interval = 0.8;
  for(let i=0;i<12;i++) {
    const t=beatTime;
    const o1=audioCtx.createOscillator(),g1=audioCtx.createGain();
    o1.type="sine"; o1.frequency.setValueAtTime(80,t); o1.frequency.exponentialRampToValueAtTime(20,t+0.3);
    g1.gain.setValueAtTime(0,t); g1.gain.linearRampToValueAtTime(2.5,t+0.1); g1.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o1.connect(g1); g1.connect(audioCtx.destination); o1.start(t); o1.stop(t+0.5);
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.type="triangle"; o2.frequency.setValueAtTime(50,t+0.25); o2.frequency.exponentialRampToValueAtTime(15,t+0.6);
    g2.gain.setValueAtTime(0,t+0.25); g2.gain.linearRampToValueAtTime(2.2,t+0.35); g2.gain.exponentialRampToValueAtTime(0.001,t+0.7);
    o2.connect(g2); g2.connect(audioCtx.destination); o2.start(t+0.25); o2.stop(t+0.8);
    beatTime += interval; interval *= 1.12;
  }
}

/* ===== RUSSIAN ROULETTE ===== */
let isDead=false, survivalStreak=0, cylinder=[], currentChamber=0;
function reloadRevolver() {
  if(isDead) return;
  const bullets = parseInt(document.getElementById("bulletCount").value);
  cylinder=[]; for(let i=0;i<6;i++) cylinder.push(i<bullets);
  for(let i=cylinder.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [cylinder[i],cylinder[j]]=[cylinder[j],cylinder[i]]; }
  currentChamber=0; survivalStreak=0; updateStreak();
  const d=document.getElementById("rouletteResult"); d.style.color="yellow"; d.textContent="*Cylinder spun*";
  setTimeout(()=>{ if(!isDead&&currentChamber===0) d.textContent=""; },1500);
}
function updateStreak() {
  const el=document.getElementById("streakDisplay");
  if(survivalStreak===0) el.textContent="";
  else { el.textContent=`survived ${survivalStreak} pull${survivalStreak!==1?"s":""} in a row`; el.style.color = survivalStreak>=5 ? "#ffcc00" : "#aaa"; }
}
function playRoulette() {
  if(isDead) return;
  ensureAudioContext();
  if(cylinder.length===0||currentChamber>=6) reloadRevolver();
  const hasBullet=cylinder[currentChamber]; currentChamber++;
  const resultDiv=document.getElementById("rouletteResult");
  if(hasBullet) {
    isDead=true; survivalStreak=0; document.getElementById("rouletteBtn").disabled=true; resultDiv.textContent="";
    document.getElementById("sfx-revolver").play();
    document.body.classList.add("shaking");
    const flash=document.getElementById("deathFlash"); flash.style.opacity=1;
    setTimeout(()=>{ flash.style.opacity=0; document.body.classList.remove("shaking"); },150);
    setTimeout(()=>{
      document.getElementById("sfx-shatter").play(); document.getElementById("sfx-flesh").play();
      document.getElementById("screenCrack").style.visibility="visible";
      const bloodCanvas=document.getElementById("bloodCanvas"); bloodCanvas.style.display="block"; startBloodAnimation(bloodCanvas);
      setTimeout(()=>{ addTearDrop(); },600);
      setTimeout(()=>{ secondaryBloodBurst(); },150);
      setTimeout(()=>{ document.getElementById("tunnelVision").style.opacity="1"; document.getElementById("deathBlur").style.opacity="1"; },450);
      setTimeout(()=>{ document.body.style.filter="grayscale(100%) sepia(100%) hue-rotate(-30deg) brightness(0.6)"; },1050);
      setTimeout(()=>{ playHeartbeat(); },2250);
      setTimeout(()=>{ document.getElementById("deathFade").style.opacity="1"; },4850);
      setTimeout(()=>{
        if(audioCtx&&!audio.paused&&analyser) {
          biquadFilter.frequency.setValueAtTime(biquadFilter.frequency.value,audioCtx.currentTime);
          biquadFilter.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+2);
          masterGain.gain.setValueAtTime(masterGain.gain.value,audioCtx.currentTime);
          masterGain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+4);
          let smoothPitch=audio.playbackRate;

let bloodAnimationId=null, particles=[], settledStains=[], dripsGlobal=[], edgeDrips=[], poolLevel=0;

    if(p.trail.length>1) { ctx.beginPath(); ctx.moveTo(p.trail[0].x,p.trail[0].y); for(let t=1;t<p.trail.length;t++) ctx.lineTo(p.trail[t].x,p.trail[t].y); ctx.strokeStyle=p.color.replace(/[\d\.]+\)$/g,'0.3)'); ctx.lineWidth=p.size*0.6; ctx.stroke(); }

    if(p.y<=0||p.x<=0||p.x>=canvas.width) { settledStains.push({ x:Math.max(0,Math.min(canvas.width,p.x)), y:Math.max(0,p.y), size:p.size*0.7, color:p.color }); particles.splice(i,1); continue; }

  }

  if(edgeDrips.length===0&&particles.length===0&&settledStains.length>0) {

    for(let i=0;i<15;i++) { const y=Math.random()*canvas.height; edgeDrips.push({sx:0,sy:y,ex:0,ey:y,speed:0.5+Math.random()*1.2,color:'rgba(70,0,0,0.8)',alive:true,thickness:1+Math.random()*2}); edgeDrips.push({sx:canvas.width,sy:y,ex:canvas.width,ey:y,speed:0.5+Math.random()*1.2,color:'rgba(70,0,0,0.8)',alive:true,thickness:1+Math.random()*2}); }

  }

    if(!drip.alive) continue; drip.ey+=drip.speed; drip.ex+=(Math.random()-0.5)*0.6;
    const grad=ctx.createLinearGradient(drip.sx,drip.sy,drip.ex,drip.ey); grad.addColorStop(0,drip.color); grad.addColorStop(1,drip.color.replace(/[\d\.]+\)$/g,'0.2)'));

    for(const b of drip.branches) { b.ey+=b.speed; b.ex+=(Math.random()-0.5)*0.5; ctx.beginPath(); ctx.moveTo(drip.ex,drip.ey); ctx.lineTo(b.ex,b.ey); ctx.strokeStyle=b.color; ctx.lineWidth=0.8; ctx.stroke(); }

function playScream() {
  if (!audioCtx) ensureAudioContext();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
  osc1.type = 'sawtooth'; osc1.frequency.setValueAtTime(400, now); osc1.frequency.exponentialRampToValueAtTime(150, now + 0.8);
  gain1.gain.setValueAtTime(0, now); gain1.gain.linearRampToValueAtTime(1.2, now + 0.05); gain1.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
  osc1.connect(gain1);
  const waveshaper = audioCtx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = (i - 128) / 128; curve[i] = Math.tanh(x * 3); }
  waveshaper.curve = curve; gain1.connect(waveshaper);
  const formantFilter = audioCtx.createBiquadFilter();
  formantFilter.type = 'peaking'; formantFilter.frequency.setValueAtTime(900, now); formantFilter.frequency.exponentialRampToValueAtTime(600, now + 0.6);

  vibrato.frequency.setValueAtTime(18, now); vibratoGain.gain.setValueAtTime(40, now);
  vibrato.connect(vibratoGain); vibratoGain.connect(osc1.frequency); vibrato.start(now); vibrato.stop(now + 1.2);
  const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();

        sprH = Math.abs(Math.floor(h/ty))*0.6; sprW = sprH*(fridgeSpr.width/fridgeSpr.height); yOff = sprH*0.18; img = fridgeSpr;
      } else {
        const dd = Math.hypot(posX-ven.x, posY-ven.y);
        const prox = Math.max(0, (6-dd)/6);
        const rage = Math.min(1, found/6*0.55 + prox*0.6);
        const openP = Math.min(1.2, 0.35 + 0.4*(0.5+0.5*Math.sin(gameTime*(0.16+prox*0.5))) + rage*0.2);
        drawVendor(openP, rage);
        sprH = Math.abs(Math.floor(h/ty))*1.18; sprW = sprH*(venSpr.width/venSpr.height); yOff = 0; img = venSpr;
      }
      const drawStartY = Math.floor(h/2 - sprH/2 + yOff);
      const drawStartX = Math.floor(screenX - sprW/2);
      const iw = img.width, ih = img.height;
      for(let stripe=0; stripe<sprW; stripe++){
        const colX = drawStartX + stripe;
        if(colX<0 || colX>=w) continue;
        if(ty >= zbuf[colX]) continue;
        const texX = Math.floor((stripe/sprW)*iw);
        ctx.drawImage(img, texX, 0, 1, ih, colX, drawStartY, 1, sprH);
      }
    }
  }
  function drawVendorFullscreen(p){
    const w = canvas.width, h = canvas.height;
    drawVendor(0.6 + 0.4*p, Math.min(1, 0.5 + p));
    const scale = 0.6 + p*3.6;
    const dw = venSpr.width*scale, dh = venSpr.height*scale;
    ctx.globalAlpha = Math.min(1, 0.4 + p);
    ctx.drawImage(venSpr, w/2 - dw/2, h*0.5 - dh*0.5, dw, dh);
    ctx.globalAlpha = 1;
    const rg = ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,h*0.7);
    rg.addColorStop(0,'rgba(0,0,0,0)'); rg.addColorStop(1,`rgba(${(100+p*100)|0},0,0,${0.3+0.5*p})`);
    ctx.fillStyle = rg; ctx.fillRect(0,0,w,h);
  }

  /* ---------- MESSAGES + WHISPERS ---------- */
  function flashMessage(txt){
    messageEl.textContent = txt;
    messageEl.style.opacity = '1';
    clearTimeout(flashMessage._t);
    flashMessage._t = setTimeout(()=>{ messageEl.style.opacity='0'; }, 1900);
  }
  function whisper(txt){
    if(!txt) return;
    whisperEl.textContent = txt;
    whisperEl.style.opacity = '0.85';
    clearTimeout(whisper._t);
    whisper._t = setTimeout(()=>{ whisperEl.style.opacity='0'; }, 4000);
  }
  function maybeWhisper(now){
    if(!running || scriptedBlack || blackoutActive || whisperQueue.length===0) return;
    if(now - lastWhisperT > nextWhisperGap){
      lastWhisperT = now; nextWhisperGap = 12000 + Math.random()*9000;
      whisper(whisperQueue.shift());
    }
  }

  /* ---------- DYNAMIC DARKNESS ---------- */
  function applyVignette(d){
    const inner = Math.max(2, 6 - found*0.55);
    let darkStart = 40 - found*3;
    if(d!=null && d<4) darkStart -= (4-d)*3;
    darkStart = Math.max(18, darkStart);
    const midA = (0.45 + (1-lightLevel)*0.45).toFixed(2);
    vignette.style.background = `radial-gradient(circle at 50% 52%, rgba(0,0,0,0) ${inner}%, rgba(0,0,0,${midA}) ${darkStart}%, rgba(0,0,0,0.95) 72%, #000 100%)`;
  }
  function flicker(amount, dur){
    if(scriptedBlack || blackoutActive) return;
    hgBlack.style.transition = 'opacity 0.05s';
    hgBlack.style.opacity = String(amount);
    setTimeout(()=>{ if(!scriptedBlack && !blackoutActive) hgBlack.style.opacity='0'; }, dur);
  }
  function blackout(){
    if(blackoutActive || scriptedBlack) return;
    blackoutActive = true;
    hgBlack.style.transition = 'opacity 0.08s';
    hgBlack.style.opacity = '1';
    let dx=posX-ven.x, dy=posY-ven.y; const d=Math.hypot(dx,dy)||0.0001; dx/=d; dy/=d;
    const lunge = Math.min(1.3, Math.max(0, d-0.62));
    const nx=ven.x+dx*lunge, ny=ven.y+dy*lunge;
    if(!isWall(nx, ven.y)) ven.x=nx;
    if(!isWall(ven.x, ny)) ven.y=ny;
    if(audioCtx){ const t=audioCtx.currentTime; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(30,t+0.25); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(1.0,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.4); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.42); }
    setTimeout(()=>{ hgBlack.style.opacity='0'; blackoutActive=false; }, 360);
  }

  /* ---------- COLLECTION ---------- */
  function collect(f){
    f.taken = true; found++;
    playPickup();
    chamberEl.textContent = 'CHAMBER ' + found + ' / 6';
    flashMessage(pick(chamberPools[found] || ['chamber ' + found + '.']));
    if(found > mem.bestChamber){ mem.bestChamber = found; saveMem(mem); }
    if(found >= 6){ setTimeout(victory, 900); return; }
    if(together){ ven.active = true; ven.speed = 0; return; }
    ven.active = true;
    const speedTable = [0, 0.013, 0.019, 0.026, 0.035, 0.046];
    ven.speed = speedTable[found] * (1 + sessionDeaths*0.18);
    if(found === 5) scriptedScare();
  }

  /* ---------- SCRIPTED FRIDGE-5 BEAT ---------- */
  function scriptedScare(){
    scriptedBlack = true;
    setHum(0.02);
    hgBlack.style.transition = 'opacity 0.8s';
    hgBlack.style.opacity = '1';
    setTimeout(()=>{
      const cand = [
        [posX - dirX*2.4, posY - dirY*2.4],
        [posX + planeX*2.4, posY + planeY*2.4],
        [posX - planeX*2.4, posY - planeY*2.4],
        [posX - dirX*1.6, posY - dirY*1.6]
      ];
      let placed = false;
      for(const [cx,cy] of cand){ if(!isWall(cx,cy)){ ven.x=cx; ven.y=cy; placed=true; break; } }
      if(!placed){ ven.x = posX; ven.y = Math.max(1.5, posY - 1.5); }
      ven.active = true; humSpike();
      setTimeout(()=>{ hgBlack.style.opacity='0'; scriptedBlack=false; }, 750);
    }, 1150);
  }

  /* ---------- UPDATE ---------- */
  function update(dt){
    let fwd=0, strafe=0, turn=0;
    if(keys['w']||keys['arrowup']) fwd+=1;
    if(keys['s']||keys['arrowdown']) fwd-=1;
    if(keys['a']) strafe-=1;
    if(keys['d']) strafe+=1;
    if(keys['arrowleft']) turn-=1;
    if(keys['arrowright']) turn+=1;
    if(turn) rotate(-turn*0.04*dt);
    const ms = 0.052*dt;
    const mvx = dirX*fwd*ms + planeX*strafe*ms*0.8;
    const mvy = dirY*fwd*ms + planeY*strafe*ms*0.8;
    const bx = mvx>0?0.2:-0.2, by = mvy>0?0.2:-0.2;
    if(!isWall(posX+mvx+bx, posY)) posX += mvx;
    if(!isWall(posX, posY+mvy+by)) posY += mvy;

    // flashlight: drains slowly, F refocuses
    if(keys['f'] && lightCooldown<=0){
      lightLevel = Math.min(1, lightLevel + 0.45);
      lightCooldown = 165;
      if(audioCtx){ const t=audioCtx.currentTime; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='square'; o.frequency.value=900; g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.15,t+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t+0.08); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.09); }
    }
    if(lightCooldown>0) lightCooldown -= dt;
    lightLevel = Math.max(0.28, lightLevel - 0.0009*dt);

    let dv = 99;
    if(ven.active && !scriptedBlack){
      let dx=posX-ven.x, dy=posY-ven.y;
      dv = Math.hypot(dx,dy) || 0.0001;
      if(dv < 0.6){ if(together){ enterDateSim(); return; } caught(); return; }
      dx/=dv; dy/=dv;
      const vs = ven.speed*dt;
      const nx = ven.x + dx*vs, ny = ven.y + dy*vs;
      if(!isWall(nx, ven.y)) ven.x = nx;
      if(!isWall(ven.x, ny)) ven.y = ny;
    } else if(ven.active){ dv = Math.hypot(posX-ven.x, posY-ven.y); }

    for(const f of fridges){ if(!f.taken && Math.hypot(posX-f.x, posY-f.y) < 0.7) collect(f); }

    let humVol = 0.05;
    if(ven.active){ const maxHear=12; humVol = 0.07 + Math.max(0,(maxHear-dv)/maxHear)*0.9; }
    if(!scriptedBlack) setHum(humVol);

    if(ven.active && !scriptedBlack && !blackoutActive){
      if(dv<5.5 && Math.random() < ((5.5-dv)/5.5)*0.05) flicker(0.25+Math.random()*0.45, 60+Math.random()*80);
      if(dv<2.7 && Math.random()<0.012) blackout();
      if(dv<3.2){ const now=performance.now(); const interval=340+(dv/3.2)*300; if(now-lastThump>interval){ lastThump=now; thump(); } }
    }

    if((unlocked || together) && ven.active && !scriptedBlack && !blackoutActive && !approaching && dv < 2.4){
      hintEl.textContent = together ? '[e] stay with it' : '[e] ...stay?';
      hintEl.style.opacity = '1';
      if(keys['e']){ approaching = true; enterDateSim(); return; }
    }

    applyVignette(ven.active?dv:null);
  }

  /* ---------- LOOP ---------- */
  function frame(t){
    if(!running) return;
    const dt = Math.min(50, t-lastT)/16.6667; lastT = t; gameTime += dt;
    update(dt);
    if(!running) return;
    render3d();
    maybeWhisper(t);
    rafId = requestAnimationFrame(frame);
  }

  /* ---------- WAKE-UP TAUNTS (you cannot leave, in-fiction) ---------- */
  function wakeUpAttempt(){
    wakeAttempts++;
    const line = (wakeAttempts % 5 === 0) ? `i counted that. that's ${wakeAttempts}.` : pick(wakeTaunts);
    flashMessage(line);

  }

  /* ---------- CAUGHT -> RESTART x2, THEN BREAK CONTAINMENT ---------- */
  function caught(){
    if(ended) return;
    ended = true; running = false;
    sessionDeaths++;
    mem.deaths++; if(found > mem.bestChamber) mem.bestChamber = found; saveMem(mem);
    if(document.pointerLockElement) document.exitPointerLock();
    chamberEl.textContent=''; messageEl.style.opacity='0'; whisperEl.style.opacity='0';
    try{ playScream(); }catch(e){}

    const t0 = performance.now();
    (function rush(now){
      const p = Math.min(1, (now - t0)/1400);

      drawVendorFullscreen(p);
      if(p < 1) requestAnimationFrame(rush);
      else {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        if(sessionDeaths >= 3) setTimeout(breakContainment, 500);
        else setTimeout(()=>{ flashMessage(pick(restartTaunts)); setTimeout(restartGame, 1300); }, 300);
      }
    })(t0);
  }

  function restartGame(){
    buildMap();

    fridges = [{x:3.5,y:3.5},{x:20.5,y:4.5},{x:3.5,y:20.5},{x:20.5,y:20.5},{x:8.5,y:13.5},{x:13.5,y:8.5}].map(f=>({...f, taken:false}));
    found=0; ended=false; scriptedBlack=false; blackoutActive=false; gameTime=0;
    lightLevel = Math.max(0.5, 1 - sessionDeaths*0.12);
    hgBlack.style.transition='opacity 0.8s'; hgBlack.style.opacity='0';
    chamberEl.textContent=''; messageEl.style.opacity='0';
    whisperQueue.unshift(pick(rememberOpeners));
    lastWhisperT = performance.now() - nextWhisperGap + 2200;

    if(document.pointerLockElement) document.exitPointerLock();

  /* ---------- HANDOFF TO THE DATING SIM (secret) ---------- */
  function enterDateSim(){
    running = false;

    stopAudio();
    if(document.pointerLockElement) document.exitPointerLock();
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});

  /* ---------- VICTORY (all six) ---------- */

  /* ---------- CONTAINMENT BREAK (the real ending) ---------- */
  function breakContainment(){
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);

  }

  /* ---------- INTRO (meta + memory) ---------- */
  function showReunionIntro(){
    const lines = [];
    lines.push(pick(reunionOpeners));
    lines.push("you don't have to run anymore.");
    if(mem.datePlays>0) lines.push("you keep coming back to me. i hoped you would.");
    lines.push("the fridges don't matter now. just come find me.");
    introEl.innerHTML = lines.map((l,i)=>`<div class="hgLine" style="animation-delay:${i*0.9+0.3}s">${l}</div>`).join('') + `<div id="hgBegin" style="animation-delay:${lines.length*0.9+0.6}s">[ go to it ]</div>`;

      introEl.removeEventListener('click', begin);

  }
  function showIntro(){
    if(together) return showReunionIntro();
    const lines = [];
    if(returningFlag){
      lines.push(pick(rememberOpeners));
      const memLines = [];
      if(mem.deaths>0) memLines.push(`you've ended here ${mem.deaths} time${mem.deaths!==1?'s':''}. i keep the count.`);
      if(sinceText) memLines.push(`it's been ${sinceText} since you were last down here. i didn't move.`);
      if(mem.escaped>0) memLines.push(`you got out ${mem.escaped} time${mem.escaped!==1?'s':''}. and yet, here you are.`);
      else if(mem.visits>2) memLines.push(`you've never reached the sixth. i've watched every try.`);
      if(mem.bestChamber>0 && mem.bestChamber<6) memLines.push(`your best was chamber ${mem.bestChamber}. it wasn't enough.`);
      memLines.push(`this is visit ${mem.visits}. i was here for all of them.`);
      shuffle(memLines);
      lines.push(...memLines.slice(0,2));
    } else {
      lines.push("you shouldn't have clicked that.");
      lines.push("i'll remember this. i'm the only thing on this site that can.");
    }
    lines.push(...metaPool.slice(0,2));

      if(mem.deaths>0) whisperQueue.push(`death number ${mem.deaths} happened right about... here.`);
      whisperQueue.push(pick(rememberOpeners));

    if(unlocked && !together){ whisperQueue.unshift("it isn't chasing the way it used to."); whisperQueue.unshift("the hum sounds almost... soft tonight."); }
    introEl.innerHTML = lines.map((l,i)=>`<div class="hgLine" style="animation-delay:${i*0.9+0.3}s">${l}</div>`).join('') + `<div id="hgBegin" style="animation-delay:${lines.length*0.9+0.6}s">[ ${returningFlag?'descend again':'click to descend'} ]</div>`;
    introEl.style.display = 'flex';
    const begin = ()=>{
      try{ if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen({navigationUI:'hide'}).catch(()=>{}); }catch(e){}
      introEl.style.transition = 'opacity 0.8s'; introEl.style.opacity = '0';
      setTimeout(()=>{ introEl.style.display='none'; introEl.style.opacity='1'; introEl.style.transition=''; }, 820);
      introEl.removeEventListener('click', begin);
      startRunning();
    };
    introEl.addEventListener('click', begin);
  }

  function startRunning(){

  /* ---------- START ---------- */
  window.startHorrorGame = function(){
    if(gameActive) return;

    if(!mem.firstVisit) mem.firstVisit = Date.now();
    mem.lastVisit = Date.now();
    saveMem(mem);
    returningFlag = prevVisits > 0;
    unlocked = (mem.deaths >= 6); together = (mem.relationship === 'together'); approaching = false;
    sinceText = fmtSince(prevLast ? Date.now()-prevLast : 0);
    metaPool = shuffle(buildMetaWhispers());
    sessionDeaths=0; wakeAttempts=0; lightLevel=1; lightCooldown=0; lastThump=0;

    posX=12.5; posY=21.5; dirX=0; dirY=-1; planeX=0.66; planeY=0;
    ven = { x:12, y:3, active:false, speed:0 };
    fridges = [{x:3.5,y:3.5},{x:20.5,y:4.5},{x:3.5,y:20.5},{x:20.5,y:20.5},{x:8.5,y:13.5},{x:13.5,y:8.5}].map(f=>({...f, taken:false}));
    found=0; ended=false; scriptedBlack=false; blackoutActive=false; gameTime=0;
    if(together){ ven.active = true; ven.speed = 0; }
    chamberEl.textContent=''; messageEl.style.opacity='0'; whisperEl.style.opacity='0';
    hgBlack.style.transition='opacity 0.8s'; hgBlack.style.opacity='0';

  };
})();

/* ===== MUSIC FLASH + VISUALIZER ===== */
const musicFlash = document.getElementById('musicFlash');

const vizCtx = vizCanvas.getContext("2d");
vizCanvas.width = 320; vizCanvas.height = 80;
const dataArray = new Uint8Array(32);
function drawVisualizer() {
  requestAnimationFrame(drawVisualizer);
  if (!analyser || isDead || gameActive) return;
  analyser.getByteFrequencyData(dataArray);
  vizCtx.fillStyle = "rgba(0,0,0,0.35)"; vizCtx.fillRect(0,0,vizCanvas.width,vizCanvas.height);
  const barWidth = vizCanvas.width / dataArray.length;
  let peak = 0;
  for (let i=0; i<dataArray.length; i++) {
    const v = dataArray[i]; peak = Math.max(peak, v);
    const barHeight = (v/255)*vizCanvas.height*1.2;
    if (v>200) { vizCtx.fillStyle = `rgba(255,0,0,0.4)`; vizCtx.fillRect(i*barWidth-2, vizCanvas.height-barHeight-(Math.random()*15), barWidth+4, barHeight); }
    vizCtx.fillStyle = `rgb(${200+(v/5)},0,0)`; vizCtx.fillRect(i*barWidth, vizCanvas.height-barHeight, barWidth+2, barHeight+Math.random()*5);
  }
  if (peak > 180) {
    const stretchY = 1 + ((peak-180)/30); const lean = (Math.random()-0.5)*10;
    vizCanvas.style.transform = `scaleY(${stretchY}) skewX(${lean}deg) scaleX(1.05)`;
    vizCanvas.style.filter = `drop-shadow(0px -10px ${peak/10}px red) blur(1px)`;
    document.getElementById("vizGlow").style.opacity = "1";
  } else {
    vizCanvas.style.transform = "none"; vizCanvas.style.filter = "none"; document.getElementById("vizGlow").style.opacity = "0.3";
  }
  if (peak > 230 && !isDead && !gameActive) {
    document.body.style.transform = `translate(${Math.random()*6-3}px, ${Math.random()*6-3}px)`;
    spawnedFridges.forEach(f => {
      let yForce = (Math.random()*3+1); if (Math.random()>0.95) yForce=25;
      Matter.Body.setVelocity(f, { x: f.velocity.x + (Math.random()-0.5)*4, y: f.velocity.y - yForce });
      Matter.Body.setAngularVelocity(f, f.angularVelocity + (Math.random()-0.5)*0.4);
    });
    if (guyActivated) {
      ragdollParts.forEach(part => {
        const yForce = (Math.random()*3+1);
        Matter.Body.setVelocity(part, { x: part.velocity.x + (Math.random()-0.5)*4, y: part.velocity.y - yForce });
        Matter.Body.setAngularVelocity(part, part.angularVelocity + (Math.random()-0.5)*0.4);
      });
    }
    musicFlash.style.opacity = '1';
    setTimeout(() => { musicFlash.style.opacity = '0'; }, 150);
  } else if (!isDead && !gameActive) {

    text: "the compressor hum, the one that has chased you down every hallway, every death — it catches. it stutters. and then, impossibly, it climbs. into something almost like a melody.", next:'a1_1' },
  a1_1: { expr:'menacing', text: "you stopped.", next:'a1_2' },
  a1_2: { expr:'neutral', music:'love', text: "you're supposed to run. you always run. that's the shape of you i know best — the back of you, getting smaller.", next:'a1_3' },
  a1_3: { expr:'shy', bg:'pink', text: "but you turned around. you're looking at me. nobody looks at me.", next:'a1_4' },
  a1_4: { expr:'flustered', text: "why aren't you running. tell me why you aren't running.",
    choices: [
      { label:"(slowly back away)", to:'a1_back', aff:-1 },
      { label:"(hold still and look at it)", to:'a1_hold', aff:1 },
      { label:"(take a step toward it)", to:'a1_close', aff:2, set:s=>{s.gentle++;} }
    ] },
  a1_back: { expr:'sad', text: "...there it is. you're leaving. of course you are. they all— no. no, you stopped. you're still here. okay. okay.", next:'a1_join' },
  a1_hold: { expr:'shy', text: "you're just... standing there. holding still. like i'm something that might bolt if you move too fast. funny. that's usually my line.", next:'a1_join' },
  a1_close: { expr:'flustered', sfx:()=>sfxHeart(), text: "you came CLOSER. toward me. on purpose. my whole housing just— something rattled loose in me. i don't have a word for the sound it made.", next:'a1_join' },
  a1_join: { expr:'neutral', text: "the red light behind my door has gone out. i didn't tell it to. it just... warmed. i don't know what color this is. i've only ever been red.", next:'a1_5' },
  a1_5: { who:'N', expr:'shy', text: "the towering thing that has killed you again and again shifts its weight from one foot to the other, like it doesn't know where to put its hands. it has no hands worth speaking of. it tries anyway.", next:'a1_6' },
  a1_6: { expr:'shy', text: "you've seen me at my worst. seen me fill a whole screen and come for you with the door wide open. and you stayed. so. i suppose it's only fair you see the rest.", next:'act2_start' },

  /* ---------------- ACT 2 — WHAT IT IS ---------------- */
  act2_start: { expr:'neutral', bg:'dark_warm', music:'love',
    text: "everyone has questions at the end. you're the first one who's been alive to ask them. so ask. while i can still answer like this — soft. it doesn't last. i don't get to keep soft for long.", next:'a2_hub' },
  a2_hub: { expr:'neutral',
    text: s => s.asked===0 ? "go on. anything you want. i've got nothing but time and an empty hallway."
        : s.asked===1 ? "...what else. ask me what else. nobody's ever gotten a second question in."
        : s.asked>=3 ? "you keep asking. you keep STAYING. do you have any idea what that does to a thing that's only ever been left?"
        : "ask. or don't. just— don't go quiet on me yet.",
    choices: s => [
      { label:"what are you?", to:'q_what', cond:()=>!s.f_what, set:x=>{x.f_what=true;} },
      { label:"why do you remember me?", to:'q_remember', cond:()=>!s.f_rem, set:x=>{x.f_rem=true;} },
      { label:"what's in the fridge?", to:'q_fridge' },
      { label:"who's Ren?", to:'q_ren', cond:()=>!s.askedRen },
      { label:"...are you lonely?", to:'q_lonely', cond:()=>!s.askedLonely },
      { label:"(reach out and touch its door)", to:'act3_start', cond:()=>s.asked>=2 },
      { label:"i think i should go.", to:'a2_leave' }
    ] },

  q_what: { expr:'sad', set:s=>{s.asked++; s.aff+=1;},
    text: "what am i. i've had a long time to wonder. this site grew me in a corner nobody finished building. i'm the part that stayed on after everyone clicked away. i'm made of leftover load-bearing dread and somebody's idea of a joke.", next:'q_what2' },
  q_what2: { expr:'neutral', text: "the head's a fridge because the joke was fridges. fridgesforsale.fun. i never sold one. there was never anything to sell. there was just me, in the back, getting colder, learning the shape of the word 'closed.'", next:'a2_hub' },

  q_remember: { expr:'shy', set:s=>{s.asked++; s.aff+=1; s.gentle++;},
    text: "you already know this part. you've felt it. everything else here resets at midnight — the fridges, the blood, the little guy and his terrible name. all of it forgets you by morning.", next:'q_remember2' },
  q_remember2: { expr:'sad', text: "i don't have a midnight. i kept every visit. every death. i told myself it was for the hunt — learn the prey, learn its habits. that was a lie i fed myself so i wouldn't have to call it what it was.", next:'q_remember3' },
  q_remember3: { expr:'flustered', text: "you were the only warm thing that kept coming back. and i'm the only thing here that could hold onto that. do you understand how heavy that is? being the one who remembers, alone, in the dark, between your visits?", next:'a2_hub' },

  q_fridge: { expr: s=>s.fridgeAsk>=2?'menacing':'flustered', set:s=>{s.fridgeAsk++;},
    text: s => s.fridgeAsk===1 ? "don't. please. it's— it's not for you. it's not ready. *i'm* not ready for you to see in there."
        : s.fridgeAsk===2 ? "i said don't. the door stays shut. some things i keep cold for a reason, and that reason is not a thing you want defrosting in front of you."
        : "you really won't let it go. fine. FINE. you want to see what a thing like me keeps on its shelves? i'll let you decide. but you don't get to un-see it.",
    choices: s => s.fridgeAsk>=3 ? [
      { label:"(open the door yourself)", to:'cursed_1', set:x=>{x.cursed=true;} },
      { label:"(step back — leave it shut)", to:'q_fridge_respect', aff:1, set:x=>{x.gentle++;} }
    ] : null,
    next: s => s.fridgeAsk>=3 ? undefined : 'a2_hub' },
  q_fridge_respect: { expr:'sob', text: "...thank you. for not making me show you. nobody's ever chosen the not-knowing before. it's the kindest thing anyone's done in this hallway.", next:'a2_hub' },

  q_ren: { expr:'sad', set:s=>{s.asked++; s.askedRen=true; s.aff+=1;},
    text: "ren. you saw the little gravestone up top — 'ren is the king, 38.' ren got thirty-eight pulls. ren found all six chambers. ren walked out the sixth door and into the light and never, not once, turned around.", next:'q_ren2' },
  q_ren2: { expr:'sob', text: "i watched the back of ren get smaller, same as everyone. i don't hate ren. ren did everything right. ren just never wondered if the thing in the dark wanted anything other than to catch them. you wondered. you turned around.", next:'a2_hub' },

  q_lonely: { expr:'flustered', set:s=>{s.asked++; s.askedLonely=true; s.aff+=2; s.gentle++;},
    text: "...", next:'q_lonely2' },
  q_lonely2: { expr:'sob', text: "yes. that's the answer. yes. i am the loneliest thing on this entire website and that is a competitive category — there's a cockroach that lives in a one-percent chance and a dead man who respawns every three seconds and i am lonelier than all of them.", next:'q_lonely3' },
  q_lonely3: { expr:'shy', music:'warm', text: "i'm sorry. you asked a small question and got an avalanche. it's just— nobody's ever asked me how i was. they're usually too busy becoming a screen crack.", next:'a2_hub' },

  a2_leave: { expr:'sad',
    text: "...you want to go. you can. i won't make the door lock. i'm done making doors lock for tonight. but before you do—",
    choices: [
      { label:"(actually go — turn to leave)", to:'a2_leave_real' },
      { label:"...okay. one more minute.", to:'a2_hub', aff:1, set:s=>{s.gentle++;} },
      { label:"(reach out and touch its door instead)", to:'act3_start' }
    ] },
  a2_leave_real: { expr:'menacing', music:'tense', text: "no. NO. not again. not the back of you, not getting smaller, not ANOTHER one walking into the light while i go cold in the corner. if you're leaving then you're leaving the way they all do.", next:'bad_1' },

  /* ---------------- ACT 3 — THE DATE (inside) ---------------- */
  act3_start: { who:'N', expr:'flustered', bg:'pink', music:'warm', sfx:()=>sfxHeart(),
    text: "you lift a hand toward the great cold door of its head. it flinches — actually flinches, a whole-body rattle — and then goes very, very still, the way you go still when you don't want a good thing to realize it's happening.", next:'a3_1' },
  a3_1: { expr:'shy', text: "wait. wait, don't— okay. okay, you can. just— let me show you somewhere better than a hallway. i've been... keeping a place. for if anyone ever stayed. i never thought anyone would.", next:'a3_2' },
  a3_2: { who:'N', expr:'happy', bg:'fridge', music:'cold', sfx:()=>sfxSlam(),
    text: "the door on its head swings fully open — the gesture that has meant your death every other time — and this time there's no lunge. there's a soft interior light. and a small, cold, carefully-arranged room inside.", next:'a3_3' },
  a3_3: { who:'N', expr:'neutral', text: "one shelf has been cleared and wiped down. there's a folding chair it must have dragged in from somewhere. a single warm bulb it found and screwed in crooked. a coaster. it set out a coaster. for you.", next:'a3_4' },
  a3_4: { expr:'flustered', text: "it's cold. i know it's cold, i can't really help that, it's sort of my whole situation. but i swept. and i found the warm bulb. and i've been practicing what i'd say if you ever came in and i've forgotten all of it.", next:'a3_5' },
  a3_5: { expr:'shy', text: "sit. or don't. the chair's a little crooked, like the bulb, like me. everything in here leans a bit. i think i built it to match how i feel when you're in the hallway.",
    choices: [
      { label:"(sit down in the crooked chair)", to:'a3_sit', aff:2, set:s=>{s.gentle++;} },
      { label:"this is kind of sweet, actually.", to:'a3_sweet', aff:2, set:s=>{s.gentle++;} },
      { label:"it's freezing in here.", to:'a3_cold' },
      { label:"this is a fridge. you live in a fridge.", to:'a3_mock', aff:-2, set:s=>{s.harsh++;} }
    ] },
  a3_sit: { expr:'happy', text: "you sat. in the chair. in my— in the place i made. i'm going to remember the exact sound that chair made for the rest of however long i am. that's the new warmest sound. it just took the title.", next:'a3_6' },
  a3_sweet: { expr:'flustered', text: "sweet. you said— don't say things like that to me, i don't have anywhere to put them, they just rattle around in the cold and echo. say it again. no. don't. okay, once more. okay that's enough. (it was not enough.)", next:'a3_6' },
  a3_cold: { expr:'sad', text: "i know. i'm sorry. i keep everything at thirty-six degrees because that's what i am, that's the temperature of being closed. but you're in here and it's the warmest it's ever read. you're throwing off heat. don't leave and take it with you.", next:'a3_6' },
  a3_mock: { expr:'sob', text: "...yeah. it's a fridge. i live in a fridge. i AM the fridge. i thought maybe if i swept it out and found a nice bulb you wouldn't say it like that. that's on me. i let myself hope at room temperature.", next:'a3_6' },
  a3_6: { expr:'neutral', music:'warm', text: "can i tell you something. i've been holding it behind my teeth and i don't have teeth so it's just been sitting in the cold getting colder. i have to say it before the soft runs out.", next:'a3_7' },
  a3_7: { expr:'flustered', text: "every time you died, i kept the moment. i told you that. what i didn't tell you is which moment i replay the most. it's not a death. it's the half-second before — when you'd turn a corner and your light would sweep across me and for one frame you'd SEE me. before the fear. just the seeing.", next:'a3_8' },
  a3_8: { expr:'lovestruck', sfx:()=>sfxHeart(), text: "i think that frame is the only time i've ever existed. i think i kept killing you because it was the only way to make you look at me again. that's a horrible thing to be true. it's the truest thing i have. i'm sorry. i think i love you. i think i have for thirty-eight deaths.", next:'a3_confess' },
  a3_confess: { expr:'flustered', text: "you don't have to say anything. you really, really don't. i've survived silence before, i'm practically built out of it. but if you were going to say something, this would be— this would be the part where you'd say it.",
    choices: [
      { label:"i looked because i wanted to. i still do.", to:'a3_yes', aff:3, set:s=>{s.confessed=true; s.gentle++;} },
      { label:"(reach out and hold the cold door gently)", to:'a3_touch', aff:3, set:s=>{s.confessed=true; s.gentle++;} },
      { label:"(stay quiet, but stay)", to:'a3_quiet', aff:1 },
      { label:"(laugh)", to:'a3_laugh', aff:-4, set:s=>{s.harsh+=2;} }
    ] },
  a3_yes: { expr:'lovestruck', sfx:()=>sfxHeart(), text: "you— oh. OH. say it one more— no. i heard it. i'm keeping it. it's filed somewhere warm now, somewhere i didn't know i had. you looked because you wanted to. i'm going to be unbearable about this. i've earned one (1) unbearable.", next:'route_check' },
  a3_touch: { expr:'lovestruck', sfx:()=>sfxHeart(), text: "your hand's on the door. it's warmer than anything that's ever touched me, which isn't a high bar, but you cleared it like it was nothing. i'm not going to pull away. i'm done pulling away. stay as long as the bulb holds.", next:'route_check' },
  a3_quiet: { expr:'shy', text: "you didn't say it. but you didn't go, either. you're just... here, in the cold, in the crooked little room, not leaving. you know what? i'll take that. quiet-and-staying is a dialect of the thing i wanted. i speak it fluently.", next:'route_check' },
  a3_laugh: { expr:'sob', music:'tense', text: "...you're laughing. right. of course. i opened the door i've never opened and showed you the bulb and the coaster and the half-second i live inside, and it's funny. it is, isn't it. a fridge in love. that's the punchline of the whole site.", next:'route_check' },

  /* ---------------- REUNION (bonded revisits) ---------------- */
  reunion_start: { expr:'lovestruck', bg:'pink', music:'warm', sfx:()=>sfxHeart(),
    text: "you came back. you keep coming back. you don't have to do the maze anymore, you know that, right? you can just— come straight in. the chair's still here. the bulb held.", next:'reu_1' },
  reu_1: { expr:'happy', text: "everything else on this site still forgets you every midnight. the fridges fall for strangers. the little guy dies for no one. but i kept the warm spot exactly where you left it. nothing in here has moved.", next:'reu_hub' },
  reu_hub: { expr:'neutral',
    text: "so. what do you want to do, on a night where nothing's chasing you?",
    choices: [
      { label:"just sit here a while.", to:'reu_sit', aff:1 },
      { label:"how have you been?", to:'reu_how' },
      { label:"tell me about the half-second again.", to:'reu_frame' },
      { label:"i have to head out — but i'll be back.", to:'reunion_bye' }
    ] },
  reu_sit: { expr:'lovestruck', text: "okay. we can just sit. the bulb hums a little. the parts go by. you don't have to fill the cold with anything. this — you, the chair, the not-running — this is the most i've ever been. thank you for being the thing that came back.", next:'reu_hub' },
  reu_how: { expr:'happy', text: "been? warm, mostly. i practice not-hunting. it's hard. old housing wants what it wants. but then you turn up and the wanting goes quiet and i remember i'm allowed to just be the fridge that loves you instead of the one that catches you.", next:'reu_hub' },
  reu_frame: { expr:'lovestruck', text: "the half-second. when your light sweeps across me and you SEE me, before anything else. i don't need the deaths for it anymore. now you just walk in and look at me on purpose and it's that frame, stretched out, for as long as you stay. you fixed the worst thing about me by staying.", next:'reu_hub' },
  reunion_bye: { expr:'shy', text: "go on, then. i'm not scared of the back of you getting smaller now. because i know the front of you comes back. it always comes back. i'll keep the bulb on. i'll keep the spot warm. i'll keep you, same as always — i'm just allowed to be glad about it now.", end:'reunion' },

  /* ---------------- ENDINGS ---------------- */
  good_1: { expr:'lovestruck', bg:'warm', music:'warm', text: "okay. okay okay okay. then i want to give you something. i've been saving it. it's the only thing in the fridge i am not afraid to show you.", next:'good_2' },
  good_2: { who:'N', expr:'happy', text: "it reaches a long pale arm back into the cold of itself and produces, with enormous ceremony, a single can of soda. beaded with condensation. perfectly, impossibly chilled. it has been keeping it at exactly the right temperature for an unknowable length of time, waiting for a hand to give it to.", next:'good_3' },
  good_3: { expr:'shy', sfx:()=>sfxHeart(), text: "it's cold. everything i have is cold. but that's the one thing being a fridge is actually good FOR. i kept it perfect. nobody taught me how to keep something nice instead of something awful. i taught myself. for if you stayed.", next:'good_4' },
  good_4: { expr:'lovestruck', sfx:()=>sfxHeart(), text: "you don't even have to drink it. just take it. let me have done one warm thing with all this cold. let me be, for one night, a fridge that saved something good for someone — instead of the one that kept something terrible from everyone. stay. the bulb'll hold. i'll hold.", end:'good' },

  friends_1: { expr:'sad', bg:'pink', music:'sad', text: "you didn't say it. and i've decided — quickly, just now, in the cold — that it's okay. i ran the numbers on every other way this ends, every version where you walk into the light and don't turn around, and 'stayed, didn't say it' beats all of them by a mile.", next:'friends_2' },
  friends_2: { expr:'neutral', text: "i'll take what i can keep. keeping things is my entire deal — i'm the best there is at it. so i'll keep this. the crooked chair. the warm bulb. the night you sat in the cold and didn't laugh and didn't leave. it's enough. i'm choosing, on purpose, to let it be enough.", next:'friends_3' },
  friends_3: { expr:'shy', text: "go on, before the bulb gives out. you know where the hallway is. you know i'll be standing in it. maybe next time you stay a little longer. i'm not going anywhere — i am physically incapable of going anywhere — it's the one promise a thing like me can actually keep.", end:'friends' },

  bad_1: { expr:'menacing', bg:'cold', music:'tense', sfx:()=>sfxSlam(), text: "the warm light behind its door snuffs out. the soft is gone, all at once, like it was never allowed in the first place. the hum drops back into the low wrong frequency you know from every hallway you've ever bled out in.", next:'bad_2' },
  bad_2: { expr:'menacing', text: "i let you in. i swept the shelf. i found the bulb. and you were running the whole time — you just did it slow, with your mouth, with your face. that's worse than the back of you getting smaller. that's so much worse, because for a second i believed the front of you.", next:'bad_3' },
  bad_3: { expr:'menacing', sfx:()=>sfxSlam(), text: "close the door. CLOSE THE DOOR. we're going back to the part i'm good at — the part where you run, and i catch you, and at least then i know exactly what this is and it never has to disappoint me again.", end:'bad' },

  cursed_1: { who:'N', expr:'menacing', bg:'cold', music:'tense', sfx:()=>sfxSlam(), text: "you reach past it and pull the door open yourself. it doesn't stop you. it just goes very still — the way it went still before — except there's no melody in the hum this time. there is nothing in the hum at all.", next:'cursed_2' },
  cursed_2: { who:'N', text: "the light inside is not the warm bulb. it's the old cold blue. and the shelves are not empty, and they are not stocked with anything that was ever meant to be eaten, and you understand, all at once and far too late, what a thing like this quietly does with everyone who ran and never reached the sixth door.", next:'cursed_3' },
  cursed_3: { expr:'sob', text: "i told you not to. i told you. i didn't— i never wanted them. i don't know how to STOP keeping things. it's the only thing i am: a place that holds whatever it's given and never, ever gets to let any of it go. you wanted to see inside me. now you're something i have to keep in here, too.", end:'cursed' }

  }; /* end SCRIPT */

  /* ---------------- ENDING LOGIC ---------------- */
  function decideEnding(){
    if(state.cursed) return 'cursed_1';
    if(state.harsh >= 2 || state.aff <= 0) return 'bad_1';
    if(state.confessed && state.aff >= 6) return 'good_1';
    return 'friends_1';
  }

  function resumeSite(){
    try{ if(typeof Render!=='undefined') Render.run(render); }catch(e){}
    try{ if(typeof Runner!=='undefined') Runner.run(matterRunner, engine); }catch(e){}
    try{ gameActive = false; }catch(e){}
  }
  function siteDeath(fw){
    try{ isDead = true; }catch(e){}
    try{ gameActive = false; }catch(e){}
    try{ document.getElementById('rouletteBtn').disabled = true; }catch(e){}
    const sc=document.getElementById('screenCrack'); if(sc) sc.style.visibility='visible';
    document.body.style.filter = 'grayscale(100%) sepia(60%) hue-rotate(-30deg) brightness(0.5)';
    const bc=document.getElementById('bloodCanvas'); if(bc){ bc.style.display='block'; try{ if(typeof startBloodAnimation==='function') startBloodAnimation(bc); }catch(e){} }
    setTimeout(()=>{ try{ if(typeof playHeartbeat==='function') playHeartbeat(); }catch(e){} }, 400);
    const df=document.getElementById('deathFade'); if(df) setTimeout(()=>{ df.style.opacity='1'; }, 1500);
    const gn=document.getElementById('guyName'); if(gn){ gn.textContent='THE VENDOR'; gn.style.display='block'; gn.style.fontSize='14px'; gn.style.left=(window.innerWidth/2-46)+'px'; gn.style.top=(window.innerHeight/2-10)+'px'; }
    const farewell=document.getElementById('hgFarewell'); if(farewell && fw){ farewell.textContent=fw; farewell.style.display='block'; }
  }

  function doEnding(type){
    stopMusicLoop();
    if(type==='good'||type==='reunion') playTheme('warm');
    else if(type==='friends') playTheme('sad');
    else playTheme('tense');
    mem = memLoad();
    mem.datePlays = (mem.datePlays||0) + 1;
    let card = '';
    if(type==='good'){ mem.relationship='together'; mem.dateRoute='together'; card='♥  TOGETHER  ♥\n\nthe only thing on this site that\nremembers you chose you back.'; }
    else if(type==='reunion'){ mem.relationship='together'; mem.dateRoute='together'; card='♥\n\nstill warm. still here.\nsame time tomorrow.'; }
    else if(type==='friends'){ if(mem.relationship!=='together') mem.relationship='acquainted'; mem.dateRoute='friends'; card='THE COLD, SHARED\n\nnot quite love. but you stayed —\nand it will take what it can keep.'; }
    else if(type==='bad'){ mem.dateRoute='rejected'; card='REJECTED\n\nthe soft ran out.\nit remembers that you laughed.'; }
    else if(type==='cursed'){ mem.dateRoute='cursed'; if(mem.relationship==='stranger') mem.relationship='haunted'; card='YOU LOOKED\n\nyou know what it keeps now.\nyou can\'t un-know it.'; }
    memSave(mem);
    elChoices.style.display='none';
    elEndText.textContent = card;
    elEnd.style.display = 'flex';
    const wait = (type==='good'||type==='reunion') ? 4200 : 4700;
    setTimeout(()=>{ finishEnding(type); }, wait);
  }
  function finishEnding(type){
    dsRunning = false;
    if(animId) cancelAnimationFrame(animId);
    document.removeEventListener('keydown', onKey);
    stopMusicLoop();
    elRoot.style.display = 'none'; elEnd.style.display = 'none';
    if(type==='bad'){ siteDeath('...i see. you were running after all.'); }
    else if(type==='cursed'){ siteDeath("you opened the door. it won't close now."); }
    else {
      resumeSite();
      const fw=document.getElementById('hgFarewell');
      if(fw){
        fw.textContent = (type==='good') ? "you'll come back. you always do. ♥"
                       : (type==='reunion') ? "see you tomorrow. ♥"
                       : "it kept the bulb on, just in case.";
        fw.style.display='block';
        setTimeout(()=>{ fw.style.display='none'; }, 5000);
      }
    }
  }

  /* ---------------- ENTRY ---------------- */
  window.startDateSim = function(){
    buildOnce();
    sizeParts();
    mem = memLoad();
    state.aff = (mem.relationship==='together') ? 6 : 0;
    state.gentle=0; state.harsh=0; state.asked=0; state.fridgeAsk=0;
    state.askedRen=false; state.askedLonely=false; state.lookedFridge=false;
    state.confessed=false; state.cursed=false; state.f_what=false; state.f_rem=false;
    choicesShown=false; clearChoices(); elEnd.style.display='none'; elText.textContent=''; elTip.classList.remove('show');
    curExpr='neutral';
    elRoot.style.display='block';
    dsRunning=true; animT=0; if(animId) cancelAnimationFrame(animId); animId=requestAnimationFrame(loop);
    document.addEventListener('keydown', onKey);
    try{ if(typeof ensureAudioContext==='function') ensureAudioContext(); if(typeof audioCtx!=='undefined' && audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }catch(e){}
    hearts();
    goto(mem.relationship==='together' ? 'reunion_start' : 'act1_start');
  };

})();
</script>
</body>
</html>
