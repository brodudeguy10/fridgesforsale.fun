<script>
/* =========================
   SCREEN CRACK CACHE‑BUSTING
========================= */
(function() {
  const crackDiv = document.getElementById('screenCrack');
  const img = new Image();
  img.onload = function() {
    crackDiv.style.backgroundImage = `url(${img.src})`;
  };
  img.src = 'screencrack.png?t=' + Date.now();
})();

/* =========================
   GLOBAL AUDIO CONTEXT
========================= */
let audioCtx = null;
function ensureAudioContext() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) {
    console.warn("AudioContext not supported.");
  }
}

/* =========================
   ECONOMY
========================= */
let fridgesOwned = 0;
const spawnedFridges = [];

function updateCounter() {
  document.getElementById("fridgeCounter").innerText = `Fridges: ${fridgesOwned}`;
}

function toggleShop() {
  const shop = document.getElementById("shopMenu");
  shop.style.display = (shop.style.display === "block") ? "none" : "block";
}

function buyAutoclicker() {
  if (fridgesOwned >= 50) {
    const removed = spawnedFridges.splice(-50);
    removed.forEach(fridge => Matter.World.remove(world, fridge));
    fridgesOwned -= 50;
    updateCounter();
    setInterval(spawnFridge, 1000);
  } else {
    alert("NOT ENOUGH FRIDGES. YOU NEED 50.");
  }
}

/* =========================
   FRIDGE PHYSICS
========================= */
const { Engine, Render, Runner, Bodies, World, Mouse, MouseConstraint } = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element: document.body,
  engine,
  options: {
    width: window.innerWidth,
    height: window.innerHeight,
    wireframes: false,
    background: "#0b0f14"
  }
});

Render.run(render);
Runner.run(Runner.create(), engine);

const ground    = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
const leftWall  = Bodies.rectangle(-25, window.innerHeight / 2, 50, window.innerHeight * 2, { isStatic: true });
const rightWall = Bodies.rectangle(window.innerWidth + 25, window.innerHeight / 2, 50, window.innerHeight * 2, { isStatic: true });
const ceiling   = Bodies.rectangle(window.innerWidth / 2, -100, window.innerWidth, 100, { isStatic: true });
World.add(world, [ground, leftWall, rightWall, ceiling]);

const fridgeImages = ["fridge1.png", "fridge2.png", "fridge3.png"];

function spawnFridge() {
  fridgesOwned++;
  updateCounter();

  const img = fridgeImages[Math.floor(Math.random() * fridgeImages.length)];
  const fridge = Bodies.rectangle(Math.random() * window.innerWidth, 50, 100, 150, {
    restitution: 0.6,
    friction: 0.2,
    render: { sprite: { texture: img, xScale: 0.35, yScale: 0.35 } }
  });
  World.add(world, fridge);
  spawnedFridges.push(fridge);
}

const mouse = Mouse.create(render.canvas);
const mouseConstraint = MouseConstraint.create(engine, {
  mouse,
  constraint: { stiffness: 0.2, render: { visible: false } }
});
World.add(world, mouseConstraint);
render.mouse = mouse;

window.addEventListener('resize', () => {
  render.canvas.width = window.innerWidth;
  render.canvas.height = window.innerHeight;
  Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 50 });
});

/* =========================
   MUSIC
========================= */
let analyser, source, masterGain, biquadFilter;
const audio = document.getElementById("audio");
const nowPlaying = document.getElementById("nowPlaying");

function initAudio() {
  if (!audioCtx) {
    ensureAudioContext();
    if (!audioCtx) return;
  }
  if (source) return;
  source = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  masterGain = audioCtx.createGain();
  biquadFilter = audioCtx.createBiquadFilter();
  biquadFilter.type = "lowpass";
  biquadFilter.frequency.value = 24000;
  analyser.fftSize = 64;
  source.connect(analyser);
  analyser.connect(biquadFilter);
  biquadFilter.connect(masterGain);
  masterGain.connect(audioCtx.destination);
}

const songs = [
  "Intentional Manslaughter - Dying Fetus.mp3",
  "INTERCRANIAL LACERATION - SCENE SLUTZ SAWN IN HALF - 02 IF THATS YO BITCH THEN WHY SHE ROTTING IN MY BASEMENT (FT. PSYCHOJAVA).mp3"
];
let current = 0;

function loadSong(i) {
  current = (i + songs.length) % songs.length;
  audio.src = songs[current];
  nowPlaying.textContent = "now playing: " + songs[current];
  audio.playbackRate = 1;
}

function togglePlay() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  if (audio.paused) audio.play();
  else audio.pause();
}
function nextSong() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  loadSong(current + 1);
  audio.play();
}
function prevSong() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  loadSong(current - 1);
  audio.play();
}
loadSong(0);

/* =========================
   HEARTBEAT & DEATH BREATHING
========================= */
function playHeartbeat() {
  if (!audioCtx) return;
  let beatTime = audioCtx.currentTime;
  let interval = 0.8;
  for (let i = 0; i < 12; i++) {
    const t = beatTime;
    // Lub
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = "sine";
    osc1.frequency.setValueAtTime(80, t);
    osc1.frequency.exponentialRampToValueAtTime(20, t + 0.3);
    gain1.gain.setValueAtTime(0, t);
    gain1.gain.linearRampToValueAtTime(2.5, t + 0.1);
    gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start(t);
    osc1.stop(t + 0.5);
    // Dub
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = "triangle";
    osc2.frequency.setValueAtTime(50, t + 0.25);
    osc2.frequency.exponentialRampToValueAtTime(15, t + 0.6);
    gain2.gain.setValueAtTime(0, t + 0.25);
    gain2.gain.linearRampToValueAtTime(2.2, t + 0.35);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(t + 0.25);
    osc2.stop(t + 0.8);
    beatTime += interval;
    interval *= 1.12;
  }
}

function playDeathBreathing() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const masterBreathGain = audioCtx.createGain();
  masterBreathGain.gain.setValueAtTime(0, now);
  masterBreathGain.gain.linearRampToValueAtTime(0.12, now + 2);
  masterBreathGain.gain.linearRampToValueAtTime(0.12, now + 8);
  masterBreathGain.gain.exponentialRampToValueAtTime(0.001, now + 12);
  masterBreathGain.connect(audioCtx.destination);

  const bufferSize = audioCtx.sampleRate * 2;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;

  const bandPass = audioCtx.createBiquadFilter();
  bandPass.type = "bandpass";
  bandPass.frequency.value = 400;
  bandPass.Q.value = 0.8;

  const bandPass2 = audioCtx.createBiquadFilter();
  bandPass2.type = "bandpass";
  bandPass2.frequency.value = 600;
  bandPass2.Q.value = 1.2;

  const gainNoise = audioCtx.createGain();
  gainNoise.gain.value = 0.8;
  noise.connect(bandPass);
  bandPass.connect(gainNoise);
  gainNoise.connect(masterBreathGain);

  const noise2 = audioCtx.createBufferSource();
  noise2.buffer = noiseBuffer;
  noise2.loop = true;
  const gainNoise2 = audioCtx.createGain();
  gainNoise2.gain.value = 0.6;
  noise2.connect(bandPass2);
  bandPass2.connect(gainNoise2);
  gainNoise2.connect(masterBreathGain);

  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 0.3;
  lfo.type = 'sine';
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 0.5;
  lfo.connect(lfoGain);
  lfoGain.connect(gainNoise.gain);

  noise.start(now);
  noise2.start(now);
  lfo.start(now);
  noise.stop(now + 14);
  noise2.stop(now + 14);
  lfo.stop(now + 14);
}

/* =========================
   RUSSIAN ROULETTE
========================= */
let isDead = false;
let survivalStreak = 0;
let cylinder = [];
let currentChamber = 0;

function reloadRevolver() {
  if (isDead) return;
  const bullets = parseInt(document.getElementById("bulletCount").value);
  cylinder = [];
  for (let i = 0; i < 6; i++) cylinder.push(i < bullets);
  for (let i = cylinder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cylinder[i], cylinder[j]] = [cylinder[j], cylinder[i]];
  }
  currentChamber = 0;
  survivalStreak = 0;
  updateStreak();
  const resultDiv = document.getElementById("rouletteResult");
  resultDiv.style.color = "yellow";
  resultDiv.textContent = "*Cylinder spun*";
  setTimeout(() => { if (!isDead && currentChamber === 0) resultDiv.textContent = ""; }, 1500);
}

function updateStreak() {
  const el = document.getElementById("streakDisplay");
  if (survivalStreak === 0) el.textContent = "";
  else {
    el.textContent = `survived ${survivalStreak} pull${survivalStreak !== 1 ? "s" : ""} in a row`;
    el.style.color = survivalStreak >= 5 ? "#ffcc00" : "#aaa";
  }
}

function playRoulette() {
  if (isDead) return;
  ensureAudioContext();
  if (cylinder.length === 0 || currentChamber >= 6) reloadRevolver();

  const hasBullet = cylinder[currentChamber];
  currentChamber++;
  const resultDiv = document.getElementById("rouletteResult");

  if (hasBullet) {
    isDead = true;
    survivalStreak = 0;
    document.getElementById("rouletteBtn").disabled = true;
    resultDiv.textContent = "";

    document.getElementById("sfx-revolver").play();
    document.body.classList.add("shaking");
    const flash = document.getElementById("deathFlash");
    flash.style.opacity = 1;
    setTimeout(() => {
      flash.style.opacity = 0;
      document.body.classList.remove("shaking");
    }, 150);

    setTimeout(() => {
      document.getElementById("sfx-shatter").play();
      document.getElementById("sfx-flesh").play();

      document.getElementById("screenCrack").style.visibility = "visible";
      document.getElementById("tunnelVision").style.opacity = "1";
      document.getElementById("deathBlur").style.opacity = "1";
      document.getElementById("deathFade").style.opacity = "1";

      document.body.style.filter = "grayscale(100%) sepia(100%) hue-rotate(-30deg) brightness(0.6)";

      const bloodCanvas = document.getElementById("bloodCanvas");
      bloodCanvas.style.display = "block";
      startBloodAnimation(bloodCanvas);

      if (audioCtx && !audio.paused && analyser) {
        biquadFilter.frequency.setValueAtTime(biquadFilter.frequency.value, audioCtx.currentTime);
        biquadFilter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 2);
        masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
        masterGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);

        let smoothPitch = audio.playbackRate;
        const dropInterval = setInterval(() => {
          smoothPitch -= 0.015;
          if (smoothPitch > 0.05) audio.playbackRate = smoothPitch;
          else { clearInterval(dropInterval); audio.pause(); }
        }, 50);
      }

      if (audioCtx) {
        const tinnitusOsc = audioCtx.createOscillator();
        const tinnitusGain = audioCtx.createGain();
        tinnitusOsc.type = 'sine';
        tinnitusOsc.frequency.value = 7500;
        tinnitusGain.gain.setValueAtTime(0, audioCtx.currentTime);
        tinnitusGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        tinnitusGain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 10);
        tinnitusOsc.connect(tinnitusGain);
        tinnitusGain.connect(audioCtx.destination);
        tinnitusOsc.start();
        tinnitusOsc.stop(audioCtx.currentTime + 10);
      }

      playHeartbeat();
      setTimeout(() => { playDeathBreathing(); }, 4000);
    }, 150);
  } else {
    survivalStreak++;
    updateStreak();
    resultDiv.style.color = "#00ff00";
    resultDiv.textContent = `Click... (Chamber ${currentChamber}/6 empty)`;
    if (currentChamber >= 6) setTimeout(() => { reloadRevolver(); }, 1500);
  }
}
window.onload = () => { reloadRevolver(); };

/* =========================
   REALISTIC BLOOD ANIMATION
========================= */
let bloodAnimationId = null;
const bloodDrops = [];

function startBloodAnimation(canvas) {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  bloodDrops.length = 0;
  for (let i = 0; i < 40; i++) {
    bloodDrops.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      speed: 0.5 + Math.random() * 2,
      size: 2 + Math.random() * 8,
      opacity: 0.5 + Math.random() * 0.5,
      trail: []
    });
  }

  ctx.fillStyle = '#4a0000';
  for (let i = 0; i < 150; i++) {
    ctx.beginPath();
    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1 + Math.random() * 25, 0, Math.PI*2);
    ctx.fill();
  }

  function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.02)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let drop of bloodDrops) {
      drop.y += drop.speed;
      if (drop.y > canvas.height + 50) {
        drop.y = -20 - Math.random() * 200;
        drop.x = Math.random() * canvas.width;
        drop.trail = [];
      }
      drop.trail.push({x: drop.x, y: drop.y});
      if (drop.trail.length > 15) drop.trail.shift();

      if (drop.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(drop.trail[0].x, drop.trail[0].y);
        for (let i = 1; i < drop.trail.length; i++) ctx.lineTo(drop.trail[i].x, drop.trail[i].y);
        ctx.strokeStyle = `rgba(139, 0, 0, ${drop.opacity * 0.8})`;
        ctx.lineWidth = drop.size * 0.5;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.arc(drop.x, drop.y, drop.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(139, 0, 0, ${drop.opacity})`;
      ctx.fill();

      drop.x += (Math.random() - 0.5) * 0.8;
    }

    ctx.fillStyle = 'rgba(80, 0, 0, 0.7)';
    ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

    bloodAnimationId = requestAnimationFrame(animate);
  }
  animate();
}

window.addEventListener('beforeunload', () => {
  if (bloodAnimationId) cancelAnimationFrame(bloodAnimationId);
});

/* =========================
   PAINT TOOL (COEXISTS WITH FRIDGE DRAGGING)
========================= */
const pCanvas = document.getElementById("paintCanvas");
const pCtx = pCanvas.getContext("2d");
function resizePaintCanvas() {
  const tempCanvas = document.createElement('canvas');
  const tCtx = tempCanvas.getContext('2d');
  tempCanvas.width = pCanvas.width;
  tempCanvas.height = pCanvas.height;
  tCtx.drawImage(pCanvas, 0, 0);
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  pCtx.drawImage(tempCanvas, 0, 0);
}
window.addEventListener('resize', resizePaintCanvas);
pCanvas.width = window.innerWidth;
pCanvas.height = window.innerHeight;

let drawingActive = false;
const drawToggle = document.getElementById("drawToggle");
const colorPicker = document.getElementById("drawColor");
const sizeSlider = document.getElementById("drawSize");
const eraserBtn = document.getElementById("eraserBtn");
let isEraserMode = false;

eraserBtn.onclick = () => {
  isEraserMode = !isEraserMode;
  eraserBtn.style.background = isEraserMode ? 'white' : '';
  eraserBtn.style.color = isEraserMode ? 'black' : '';
};
window.clearCanvas = () => {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
};

const renderCanvas = render.canvas;

renderCanvas.addEventListener('mousedown', (e) => {
  if (!drawToggle.checked) return;
  if (mouseConstraint.constraint.bodyB) return;
  drawingActive = true;
  pCtx.beginPath();
  pCtx.moveTo(e.clientX, e.clientY);
});

renderCanvas.addEventListener('mousemove', (e) => {
  if (!drawingActive || !drawToggle.checked) return;
  if (mouseConstraint.constraint.bodyB) {
    drawingActive = false;
    return;
  }
  pCtx.lineWidth = sizeSlider.value;
  pCtx.lineCap = "round";
  if (isEraserMode) {
    pCtx.globalCompositeOperation = "destination-out";
    pCtx.strokeStyle = "rgba(0,0,0,1)";
  } else {
    pCtx.globalCompositeOperation = "source-over";
    pCtx.strokeStyle = colorPicker.value;
  }
  pCtx.lineTo(e.clientX, e.clientY);
  pCtx.stroke();
});

renderCanvas.addEventListener('mouseup', () => { drawingActive = false; });
renderCanvas.addEventListener('mouseout', () => { drawingActive = false; });

/* =========================
   COCKROACH JUMPSCARE
========================= */
const roachVid = document.getElementById('cockroachVid');
let roachActive = false;
setInterval(() => {
  if (!isDead && !roachActive && Math.random() < 0.01) {
    roachActive = true;
    roachVid.style.display = "block";
    roachVid.play();
  }
}, 1000);
roachVid.onended = () => {
  roachVid.style.display = "none";
  roachActive = false;
};

/* =========================
   KONAMI CODE
========================= */
const KONAMI_SEQUENCE = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a','s','t','a','r','t'];
let konamiProgress = 0;
document.addEventListener('keydown', (e) => {
  if (e.key === KONAMI_SEQUENCE[konamiProgress]) {
    konamiProgress++;
    if (konamiProgress === KONAMI_SEQUENCE.length) {
      triggerGundham();
      konamiProgress = 0;
    }
  } else {
    konamiProgress = (e.key === KONAMI_SEQUENCE[0]) ? 1 : 0;
  }
});
function triggerGundham() {
  audio.pause();
  Render.stop(render);
  document.body.innerHTML = '';
  document.body.style.cssText = 'margin:0; background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden;';
  const img = document.createElement('img');
  img.src = 'gundlex.gif';
  img.style.cssText = 'max-width:100vw; max-height:100vh; object-fit:contain;';
  document.body.appendChild(img);
}

/* =========================
   VISUALIZER
========================= */
const vizCanvas = document.getElementById("viz");
const vizCtx = vizCanvas.getContext("2d");
vizCanvas.width = 320;
vizCanvas.height = 80;
const dataArray = new Uint8Array(32);

function draw() {
  requestAnimationFrame(draw);
  if (!analyser || isDead) return;
  analyser.getByteFrequencyData(dataArray);
  vizCtx.fillStyle = "rgba(0, 0, 0, 0.35)";
  vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
  const barWidth = vizCanvas.width / dataArray.length;
  let peak = 0;

  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i];
    peak = Math.max(peak, v);
    const barHeight = (v / 255) * vizCanvas.height * 1.2;
    if (v > 200) {
      vizCtx.fillStyle = `rgba(255, 0, 0, 0.4)`;
      vizCtx.fillRect(i * barWidth - 2, vizCanvas.height - barHeight - (Math.random() * 15), barWidth + 4, barHeight);
    }
    vizCtx.fillStyle = `rgb(${200 + (v / 5)}, 0, 0)`;
    vizCtx.fillRect(i * barWidth, vizCanvas.height - barHeight, barWidth + 2, barHeight + Math.random() * 5);
  }

  if (peak > 180) {
    const stretchY = 1 + ((peak - 180) / 30);
    const lean = (Math.random() - 0.5) * 10;
    vizCanvas.style.transform = `scaleY(${stretchY}) skewX(${lean}deg) scaleX(1.05)`;
    vizCanvas.style.filter = `drop-shadow(0px -10px ${peak/10}px red) blur(1px)`;
    document.getElementById("vizGlow").style.opacity = "1";
  } else {
    vizCanvas.style.transform = "none";
    vizCanvas.style.filter = "none";
    document.getElementById("vizGlow").style.opacity = "0.3";
  }

  if (peak > 230 && !isDead) {
    document.body.style.transform = `translate(${Math.random()*6-3}px, ${Math.random()*6-3}px)`;
    spawnedFridges.forEach(f => {
      let yForce = (Math.random() * 3 + 1);
      if (Math.random() > 0.95) yForce = 25;
      Matter.Body.setVelocity(f, {
        x: f.velocity.x + (Math.random() - 0.5) * 4,
        y: f.velocity.y - yForce
      });
      Matter.Body.setAngularVelocity(f, f.angularVelocity + (Math.random() - 0.5) * 0.4);
    });
  } else if (!isDead) {
    document.body.style.transform = "none";
  }
}
draw();
</script>
