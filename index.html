<!DOCTYPE html>
<html>
<head>
  <title>fridgesforsale.fun</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0f14;
      font-family: Arial;
      transition: transform 0.05s;
    }

    /* ===== HEADER ===== */
    #header {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      pointer-events: none;
    }

    #header img {
      width: 420px;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ===== BUTTON ===== */
    #spawnBtn {
      position: fixed;
      top: 130px;
      left: 20px;
      z-index: 9999;
      padding: 12px 18px;
      cursor: pointer;
    }

    /* ===== MUSIC PLAYER ===== */
    #musicPlayer {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 10000;
      width: 340px;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px;
      border: 1px solid #333;
    }

    /* PROTECT THE TEXT */
    .text-layer {
      position: relative;
      z-index: 10005;
      text-shadow: 2px 2px 4px black, -1px -1px 4px black, 0px 0px 8px black;
      pointer-events: none; 
    }

    #controls button {
      margin: 3px;
      cursor: pointer;
      position: relative;
      z-index: 10005; 
    }

    /* ===== VISUALIZER ===== */
    #viz {
      width: 320px;
      height: 80px;
      background: black;
      display: block;
      margin-top: 10px;
      transform-origin: bottom center; 
      transition: transform 0.05s, filter 0.05s;
      position: relative;
      z-index: 10001; 
    }

    #vizGlow {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      pointer-events: none;
      background: radial-gradient(circle, rgba(200,0,0,0.35), transparent);
      filter: blur(20px);
      opacity: 0.5;
      transition: opacity 0.1s;
    }
  </style>
</head>

<body>

<div id="header">
  <img src="cooltext509446167575809.gif">
</div>

<button id="spawnBtn">spawn fridge</button>

<div id="musicPlayer">

  <div class="text-layer" style="font-weight:bold; margin-bottom:5px;">
    LISTEN TO THIS TRACK, BIATCH!
  </div>

  <div id="nowPlaying" class="text-layer">now playing: loading...</div>

  <audio id="audio"></audio>

  <div id="controls">
    <button onclick="prevSong()">prev</button>
    <button onclick="togglePlay()">play/pause</button>
    <button onclick="nextSong()">next</button>
  </div>

  <canvas id="viz"></canvas>

</div>

<div id="vizGlow"></div>

<script>
/* =========================
   FRIDGE PHYSICS
========================= */

const { Engine, Render, Runner, Bodies, World, Mouse, MouseConstraint } = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element: document.body,
  engine,
  options: {
    width: window.innerWidth,
    height: window.innerHeight,
    wireframes: false,
    background: "#0b0f14"
  }
});

Render.run(render);
Runner.run(Runner.create(), engine);

const ground = Bodies.rectangle(
  window.innerWidth / 2,
  window.innerHeight + 50,
  window.innerWidth,
  100,
  { isStatic: true }
);

World.add(world, ground);

const fridgeImages = ["fridge1.png", "fridge2.png", "fridge3.png"];

// TRACK ALL FRIDGES IN AN ARRAY SO WE CAN MAKE THEM DANCE
const spawnedFridges = [];

function spawnFridge() {
  const img = fridgeImages[Math.floor(Math.random() * fridgeImages.length)];

  const fridge = Bodies.rectangle(
    Math.random() * window.innerWidth,
    -50,
    80,
    100,
    {
      restitution: 0.4,
      friction: 0.2,
      render: {
        sprite: {
          texture: img,
          xScale: 0.25,
          yScale: 0.25
        }
      }
    }
  );

  World.add(world, fridge);
  spawnedFridges.push(fridge); // Save the fridge for later
}

document.getElementById("spawnBtn").onclick = spawnFridge;

const mouse = Mouse.create(render.canvas);
const mouseConstraint = MouseConstraint.create(engine, {
  mouse,
  constraint: { stiffness: 0.2, render: { visible: false } }
});

World.add(world, mouseConstraint);
render.mouse = mouse;

/* =========================
   AUDIO ENGINE & MUSIC SYSTEM
========================= */

let audioCtx;
let analyser;
let source;

function initAudio() {
  if (audioCtx) return;

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();

    analyser.fftSize = 64;

    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  } catch (e) {
    console.warn("Audio Context failed to start (usually a local file security block).", e);
  }
}

const songs = [
  "Intentional Manslaughter - Dying Fetus.mp3",
  "INTERCRANIAL LACERATION - SCENE SLUTZ SAWN IN HALF - 02 IF THATS YO BITCH THEN WHY SHE ROTTING IN MY BASEMENT (FT. PSYCHOJAVA).mp3"
];

let current = 0;
const audio = document.getElementById("audio");
const nowPlaying = document.getElementById("nowPlaying");

function loadSong(i) {
  current = (i + songs.length) % songs.length;
  audio.src = songs[current];
  nowPlaying.textContent = "now playing: " + songs[current];
}

function togglePlay() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  audio.paused ? audio.play() : audio.pause();
}

function nextSong() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  loadSong(current + 1);
  audio.play();
}

function prevSong() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  loadSong(current - 1);
  audio.play();
}

// Load the first song instantly
loadSong(0);

/* =========================
   VISUALIZER (BLOODY CHAOS MODE WITH DANCING FRIDGES)
========================= */

const canvas = document.getElementById("viz");
const ctx = canvas.getContext("2d");

canvas.width = 320;
canvas.height = 80;

const dataArray = new Uint8Array(32);

function draw() {
  requestAnimationFrame(draw);

  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  // Motion Blur effect
  ctx.fillStyle = "rgba(0, 0, 0, 0.35)"; 
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const barWidth = canvas.width / dataArray.length;
  let peak = 0;

  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i];
    peak = Math.max(peak, v);

    const barHeight = (v / 255) * canvas.height * 1.2;

    if (v > 200) {
      ctx.fillStyle = `rgba(255, 0, 0, 0.4)`;
      ctx.fillRect(
        i * barWidth - 2, 
        canvas.height - barHeight - (Math.random() * 15), 
        barWidth + 4, 
        barHeight
      );
    }

    ctx.fillStyle = `rgb(${200 + (v / 5)}, 0, 0)`;
    ctx.fillRect(
      i * barWidth,
      canvas.height - barHeight,
      barWidth + 2,
      barHeight + Math.random() * 5 
    );
  }

  /* VISUAL BREAKOUT */
  if (peak > 180) {
    const stretchY = 1 + ((peak - 180) / 30);
    const lean = (Math.random() - 0.5) * 10; 
    
    canvas.style.transform = `scaleY(${stretchY}) skewX(${lean}deg) scaleX(1.05)`;
    canvas.style.filter = `drop-shadow(0px -10px ${peak/10}px red) blur(1px)`;
    document.getElementById("vizGlow").style.opacity = "1";
  } else {
    canvas.style.transform = "none";
    canvas.style.filter = "none";
    document.getElementById("vizGlow").style.opacity = "0.3";
  }

  /* GLOBAL SHOCKWAVE & DANCING FRIDGES */
  if (peak > 230) {
    // 1. Shake the screen
    document.body.style.transform = `translate(${Math.random()*6-3}px, ${Math.random()*6-3}px)`;
    
    // 2. Make the fridges jump and spin to the bass
    spawnedFridges.forEach(f => {
      Matter.Body.setVelocity(f, {
        x: f.velocity.x + (Math.random() - 0.5) * 8, // Violent sideways shudder
        y: f.velocity.y - (Math.random() * 6)        // Jump upwards
      });
      // Add a random violent spin
      Matter.Body.setAngularVelocity(f, f.angularVelocity + (Math.random() - 0.5) * 0.4);
    });

  } else {
    document.body.style.transform = "none";
  }
}

draw();
</script>

</body>
</html>
