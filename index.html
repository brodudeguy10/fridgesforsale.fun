<!DOCTYPE html>
<html>
<head>
  <title>fridgesforsale.fun</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0f14;
      font-family: Arial;
      transition: transform 0.05s;
    }

    /* ===== HEADER ===== */
    #header {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      pointer-events: none;
    }

    #header img {
      width: 420px;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ===== BUTTON ===== */
    #spawnBtn {
      position: fixed;
      top: 130px;
      left: 20px;
      z-index: 9999;
      padding: 12px 18px;
      cursor: pointer;
    }

    /* ===== MUSIC PLAYER ===== */
    #musicPlayer {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 10000;
      width: 340px;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px;
      border: 1px solid #333;
    }

    #controls button {
      margin: 3px;
      cursor: pointer;
    }

    /* ===== VISUALIZER ===== */
    #viz {
      width: 320px;
      height: 80px;
      background: black;
      display: block;
    }

    #vizGlow {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      pointer-events: none;
      background: radial-gradient(circle, rgba(0,255,0,0.25), transparent);
      filter: blur(20px);
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div id="header">
  <img src="cooltext509446167575809.gif">
</div>

<button id="spawnBtn">spawn fridge</button>

<div id="musicPlayer">

  <div style="font-weight:bold; margin-bottom:5px;">
    LISTEN TO THIS TRACK, BIATCH!
  </div>

  <div id="nowPlaying">now playing: nothing</div>

  <audio id="audio" crossorigin="anonymous"></audio>

  <div id="controls">
    <button onclick="prevSong()">prev</button>
    <button onclick="togglePlay()">play/pause</button>
    <button onclick="nextSong()">next</button>
  </div>

  <canvas id="viz"></canvas>

</div>

<div id="vizGlow"></div>

<script>
/* =========================
   FRIDGE PHYSICS
========================= */

const { Engine, Render, Runner, Bodies, World, Mouse, MouseConstraint } = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element: document.body,
  engine,
  options: {
    width: window.innerWidth,
    height: window.innerHeight,
    wireframes: false,
    background: "#0b0f14"
  }
});

Render.run(render);
Runner.run(Runner.create(), engine);

const ground = Bodies.rectangle(
  window.innerWidth / 2,
  window.innerHeight + 50,
  window.innerWidth,
  100,
  { isStatic: true }
);

World.add(world, ground);

const fridgeImages = ["fridge1.png", "fridge2.png", "fridge3.png"];

function spawnFridge() {
  const img = fridgeImages[Math.floor(Math.random() * fridgeImages.length)];

  const fridge = Bodies.rectangle(
    Math.random() * window.innerWidth,
    -50,
    80,
    100,
    {
      restitution: 0.4,
      friction: 0.2,
      render: {
        sprite: {
          texture: img,
          xScale: 0.25,
          yScale: 0.25
        }
      }
    }
  );

  World.add(world, fridge);
}

document.getElementById("spawnBtn").onclick = spawnFridge;

const mouse = Mouse.create(render.canvas);
const mouseConstraint = MouseConstraint.create(engine, {
  mouse,
  constraint: { stiffness: 0.2, render: { visible: false } }
});

World.add(world, mouseConstraint);
render.mouse = mouse;

/* =========================
   AUDIO ENGINE & MUSIC SYSTEM
========================= */

let audioCtx;
let analyser;
let source;

// Initialize the Audio Context (Called by the play buttons now)
function initAudio() {
  if (audioCtx) return; // Only run once

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  source = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();

  analyser.fftSize = 64;

  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

const songs = [
  "Intentional Manslaughter - Dying Fetus.mp3",
  "INTERCRANIAL LACERATION - SCENE SLUTZ SAWN IN HALF - 02 IF THATS YO BITCH THEN WHY SHE ROTTING IN MY BASEMENT (FT. PSYCHOJAVA).mp3"
];

let current = 0;
const audio = document.getElementById("audio");
const nowPlaying = document.getElementById("nowPlaying");

function loadSong(i) {
  current = (i + songs.length) % songs.length;
  audio.src = songs[current];
  nowPlaying.textContent = "now playing: " + songs[current];
}

// Fixed Playback Functions: Wake up the Audio Context BEFORE playing
function togglePlay() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  audio.paused ? audio.play() : audio.pause();
}

function nextSong() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  loadSong(current + 1);
  audio.play();
}

function prevSong() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  loadSong(current - 1);
  audio.play();
}

// Load the first song on startup
loadSong(0);

/* =========================
   VISUALIZER (CHAOS MODE)
========================= */

const canvas = document.getElementById("viz");
const ctx = canvas.getContext("2d");

canvas.width = 320;
canvas.height = 80;

const dataArray = new Uint8Array(32); // Half of fftSize (64/2)

function draw() {
  requestAnimationFrame(draw);

  if (!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const barWidth = canvas.width / dataArray.length;

  let peak = 0;

  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i];
    peak = Math.max(peak, v);

    ctx.fillStyle = `hsl(${v * 1.2}, 100%, 50%)`;
    ctx.fillRect(
      i * barWidth,
      canvas.height - v,
      barWidth + 2,
      v + Math.random() * 6
    );
  }

  /* VISUAL BREAKOUT */
  if (peak > 200) {
    canvas.style.transform = `rotate(${Math.random() * 3 - 1.5}deg) scale(1.15)`;
    document.getElementById("vizGlow").style.opacity = "1";
  } else {
    canvas.style.transform = "none";
    document.getElementById("vizGlow").style.opacity = "0.5";
  }

  /* GLOBAL SHOCKWAVE */
  if (peak > 240) {
    document.body.style.transform =
      `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
  } else {
    document.body.style.transform = "none";
  }
}

draw();
</script>

</body>
</html>
